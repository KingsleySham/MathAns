<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Roster Grid | The Redemption of the White Queen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;600;700;800;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="../../roster/roster.js" defer></script>
<script src="roster-grid.js" defer></script>
<script>
  tailwind.config = { darkMode: "class", theme: { extend: {
    colors: {
      "primary": "#15157d", "primary-container": "#2e3192", "primary-fixed": "#e1e0ff", "primary-fixed-dim": "#c0c1ff",
      "on-primary": "#ffffff", "on-primary-fixed-variant": "#373a9b",
      "secondary": "#7c44a8", "secondary-fixed": "#f2daff",
      "error": "#ba1a1a", "error-container": "#ffdad6",
      "surface": "#f9f9fb", "surface-container-low": "#f3f3f5", "surface-container-lowest": "#ffffff",
      "surface-container-high": "#e8e8ea", "on-surface": "#1a1c1d", "on-surface-variant": "#464652",
      "outline": "#777683", "outline-variant": "#c7c5d4",
      "inverse-surface": "#2f3132", "inverse-on-surface": "#f0f0f2"
    },
    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
    fontFamily: { "headline": ["Epilogue"], "body": ["Manrope"], "label": ["Manrope"] }
  }}}
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; }
  .gap-cell { background: #ffdad6; border: 2px dashed #ba1a1a; }
  .roster-cell { border: 1px solid #c7c5d4; padding: 8px; min-height: 60px; font-size: 12px; word-wrap: break-word; }
  .roster-cell.assigned { background: #e1e0ff; }
  .header-col { background: #f3f3f5; font-weight: bold; border: 1px solid #c7c5d4; padding: 8px; }
  .header-row { background: #f3f3f5; font-weight: bold; border: 1px solid #c7c5d4; padding: 8px; }
</style>
</head>
<body class="bg-surface font-body text-on-surface antialiased">

<div class="min-h-screen flex flex-col">
  <header class="bg-gradient-to-r from-primary to-primary-container text-white px-8 py-6">
    <div class="max-w-7xl mx-auto">
      <h1 class="font-headline text-4xl font-extrabold mb-2">The Redemption of the White Queen</h1>
      <p class="text-sm text-primary-fixed-dim">S.3G4 English Drama | Competition: 8 May 2026 | Roster Preview Draft 1</p>
    </div>
  </header>

  <main class="flex-1 px-8 py-8">
    <div class="max-w-7xl mx-auto space-y-8">

      <!-- Session + Role Management Panel -->
      <div class="bg-white rounded-2xl p-8 border border-outline-variant/10 shadow-sm">
        <div class="flex items-center justify-between mb-6">
          <h2 class="font-headline text-2xl font-extrabold text-primary">Sessions & Roles</h2>
          <div class="flex gap-3">
            <button id="add-session-btn" class="px-4 py-2 bg-primary text-white rounded-full text-xs font-bold">+ Session</button>
            <button id="add-role-btn" class="px-4 py-2 bg-secondary text-white rounded-full text-xs font-bold">+ Role</button>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-6">
          <!-- Sessions List -->
          <div>
            <h3 class="font-bold text-primary mb-4">Sessions</h3>
            <div id="sessions-list" class="space-y-2 max-h-96 overflow-y-auto"></div>
          </div>

          <!-- Roles List -->
          <div>
            <h3 class="font-bold text-primary mb-4">Roles</h3>
            <div id="roles-list" class="space-y-2 max-h-96 overflow-y-auto"></div>
          </div>
        </div>
      </div>

      <!-- Gaps Alert -->
      <div id="gaps-alert" class="hidden bg-error-container rounded-2xl p-6 flex items-start gap-4">
        <span class="material-symbols-outlined text-error text-3xl mt-1">warning</span>
        <div class="flex-1">
          <p class="font-bold text-error">Unfilled roles detected</p>
          <p class="text-sm text-on-surface-variant mt-1" id="gaps-count">—</p>
          <div id="gaps-list" class="mt-3 space-y-1"></div>
        </div>
      </div>

      <!-- ROSTER GRID ──────────────────────────────────── -->
      <div class="bg-white rounded-2xl border border-outline-variant/10 shadow-sm overflow-auto">
        <div class="p-6 border-b border-outline-variant/10">
          <h2 class="font-headline text-2xl font-extrabold text-primary mb-2">Roster Grid</h2>
          <p class="text-sm text-on-surface-variant">Click any cell to assign or remove crew</p>
        </div>

        <div class="overflow-x-auto p-6">
          <table class="border-collapse" id="roster-table"></table>
        </div>
      </div>

      <!-- Link back -->
      <div class="text-center">
        <a href="../../roster" class="inline-flex items-center gap-2 px-6 py-3 bg-surface-container-high rounded-full text-sm font-bold hover:bg-outline-variant/20">
          ← Back to main roster app
        </a>
      </div>
    </div>
  </main>
</div>

<!-- Add Session Modal -->
<div id="session-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-2xl p-8 max-w-md w-full">
    <h3 class="font-headline text-2xl font-extrabold text-primary mb-4">New Session</h3>
    <label class="block text-xs font-bold uppercase tracking-widest text-primary mb-2">Date & Time</label>
    <input id="session-datetime" type="datetime-local" class="w-full bg-surface-container-high border-none rounded-lg p-3 mb-4 focus:ring-2 focus:ring-primary-fixed"/>
    <label class="block text-xs font-bold uppercase tracking-widest text-primary mb-2">Type</label>
    <select id="session-type" class="w-full bg-surface-container-high border-none rounded-lg p-3 mb-4 focus:ring-2 focus:ring-primary-fixed">
      <option value="rehearsal">🎭 Rehearsal</option>
      <option value="tech_run">⚙️ Tech Run</option>
      <option value="dress_rehearsal">👗 Dress Rehearsal</option>
      <option value="performance">🎬 Performance</option>
      <option value="bump_in">📦 Bump-in</option>
      <option value="bump_out">📦 Bump-out</option>
    </select>
    <label class="block text-xs font-bold uppercase tracking-widest text-primary mb-2">Label</label>
    <input id="session-label" type="text" placeholder="e.g., Day 3 Rehearsal" class="w-full bg-surface-container-high border-none rounded-lg p-3 mb-4 focus:ring-2 focus:ring-primary-fixed"/>
    <label class="block text-xs font-bold uppercase tracking-widest text-primary mb-2">Venue</label>
    <input id="session-venue" type="text" placeholder="e.g., Main Hall" class="w-full bg-surface-container-high border-none rounded-lg p-3 mb-6 focus:ring-2 focus:ring-primary-fixed"/>
    <div class="flex gap-3">
      <button id="close-session-modal" class="flex-1 py-3 bg-surface-container-high rounded-full font-bold">Cancel</button>
      <button id="confirm-session-modal" class="flex-1 py-3 bg-primary text-white rounded-full font-bold">Add</button>
    </div>
  </div>
</div>

<!-- Add Role Modal -->
<div id="role-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-2xl p-8 max-w-md w-full">
    <h3 class="font-headline text-2xl font-extrabold text-primary mb-4">New Role</h3>
    <label class="block text-xs font-bold uppercase tracking-widest text-primary mb-2">Role Name</label>
    <input id="role-name" type="text" placeholder="e.g., Video Technician" class="w-full bg-surface-container-high border-none rounded-lg p-3 mb-4 focus:ring-2 focus:ring-primary-fixed"/>
    <label class="block text-xs font-bold uppercase tracking-widest text-primary mb-2">Color</label>
    <input id="role-color" type="color" value="#FFD700" class="w-full h-12 rounded-lg mb-6"/>
    <div class="flex gap-3">
      <button id="close-role-modal" class="flex-1 py-3 bg-surface-container-high rounded-full font-bold">Cancel</button>
      <button id="confirm-role-modal" class="flex-1 py-3 bg-secondary text-white rounded-full font-bold">Add</button>
    </div>
  </div>
</div>

<!-- Assign Modal -->
<div id="assign-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-2xl p-8 max-w-md w-full">
    <h3 class="font-headline text-2xl font-extrabold text-primary mb-4">Assign Crew</h3>
    <p id="assign-modal-slot" class="text-sm text-on-surface-variant mb-4">—</p>
    <label class="block text-xs font-bold uppercase tracking-widest text-primary mb-2">Select person</label>
    <select id="assign-person" class="w-full bg-surface-container-high border-none rounded-lg p-3 mb-4 focus:ring-2 focus:ring-primary-fixed">
      <option value="">Choose...</option>
    </select>
    <label class="block text-xs font-bold uppercase tracking-widest text-primary mb-2">Notes (optional)</label>
    <input id="assign-notes" type="text" placeholder="e.g., arrive 30 min early" class="w-full bg-surface-container-high border-none rounded-lg p-3 mb-6 focus:ring-2 focus:ring-primary-fixed"/>
    <div class="flex gap-3">
      <button id="close-assign-modal" class="flex-1 py-3 bg-surface-container-high rounded-full font-bold">Cancel</button>
      <button id="confirm-assign-modal" class="flex-1 py-3 bg-primary text-white rounded-full font-bold">Assign</button>
    </div>
  </div>
</div>

<script>
  let currentAssignSlot = null; // { sessionId, roleId }

  function ensureData() {
    Roster.ensureSeed();
    RosterGrid.ensureDefaults();
  }

  function renderSessions() {
    const sessions = RosterGrid.getSessions().sort((a, b) => new Date(a.dateTime) - new Date(b.dateTime));
    const list = document.getElementById('sessions-list');
    list.innerHTML = sessions.length ? sessions.map(s => `<div class="p-3 rounded-lg bg-surface-container-low flex items-start justify-between">
      <div class="flex-1 text-xs">
        <p class="font-bold text-primary">${RosterGrid.formatDateTime(s.dateTime)}</p>
        <p class="text-on-surface-variant">${RosterGrid.typeLabel(s.type)} · ${s.venue}</p>
      </div>
      <button data-del-session="${s.id}" class="px-2 py-1 text-error text-xs font-bold">Delete</button>
    </div>`).join('') : '<p class="text-xs text-on-surface-variant">No sessions yet. Add one to start.</p>';
    list.querySelectorAll('[data-del-session]').forEach(btn => {
      btn.addEventListener('click', () => {
        RosterGrid.removeSession(btn.dataset.delSession);
        renderSessions();
        renderRoster();
      });
    });
  }

  function renderRoles() {
    const roles = RosterGrid.getRoles();
    const list = document.getElementById('roles-list');
    list.innerHTML = roles.length ? roles.map(r => `<div class="p-3 rounded-lg bg-surface-container-low flex items-center justify-between">
      <div class="flex items-center gap-3 flex-1">
        <div class="w-4 h-4 rounded" style="background: ${r.color}"></div>
        <p class="text-xs font-bold text-on-surface">${r.name}</p>
      </div>
      <button data-del-role="${r.id}" class="px-2 py-1 text-error text-xs font-bold">Delete</button>
    </div>`).join('') : '<p class="text-xs text-on-surface-variant">No roles yet.</p>';
    list.querySelectorAll('[data-del-role]').forEach(btn => {
      btn.addEventListener('click', () => {
        RosterGrid.removeRole(btn.dataset.delRole);
        renderRoles();
        renderRoster();
      });
    });
  }

  function renderRoster() {
    const sessions = RosterGrid.getSessions().sort((a, b) => new Date(a.dateTime) - new Date(b.dateTime));
    const roles = RosterGrid.getRoles();
    const assignments = RosterGrid.getAssignments();
    const ledger = Roster.getLedger();

    let html = '<thead><tr><th class="header-row w-32">Role</th>';
    sessions.forEach(s => {
      html += `<th class="header-col min-w-48">${RosterGrid.typeLabel(s.type)}<br/><span class="text-xs font-normal">${s.venue}</span></th>`;
    });
    html += '</tr></thead><tbody>';

    roles.forEach(role => {
      html += `<tr><td class="header-row" style="background-color: ${role.color}20">${role.name}</td>`;
      sessions.forEach(session => {
        const assigned = assignments.filter(a => a.sessionId === session.id && a.roleId === role.id);
        const hasAssigned = assigned.length > 0;
        html += `<td class="roster-cell ${hasAssigned ? 'assigned' : 'gap-cell'} cursor-pointer hover:opacity-80" data-session="${session.id}" data-role="${role.id}">`;
        if (hasAssigned) {
          html += assigned.map(a => {
            const person = ledger.find(p => p.id === a.studentId);
            return `<div class="text-xs font-bold text-primary mb-1">${person ? person.name : 'Unknown'}</div>`;
          }).join('');
        } else {
          html += '<div class="text-xs font-bold text-error">NEED</div>';
        }
        html += '</td>';
      });
      html += '</tr>';
    });
    html += '</tbody>';

    document.getElementById('roster-table').innerHTML = html;

    // Cell click handlers
    document.querySelectorAll('[data-session][data-role]').forEach(cell => {
      cell.addEventListener('click', () => {
        const sessionId = cell.dataset.session;
        const roleId = cell.dataset.role;
        const session = sessions.find(s => s.id === sessionId);
        const role = roles.find(r => r.id === roleId);
        const assigned = assignments.find(a => a.sessionId === sessionId && a.roleId === roleId);

        if (assigned) {
          if (confirm(`Remove ${ledger.find(p => p.id === assigned.studentId)?.name || 'this person'}?`)) {
            RosterGrid.unassign(assigned.id);
            renderRoster();
            renderGaps();
          }
        } else {
          openAssignModal(sessionId, roleId, session, role);
        }
      });
    });

    renderGaps();
  }

  function renderGaps() {
    const gaps = RosterGrid.getGaps();
    const gapAlert = document.getElementById('gaps-alert');
    if (gaps.length === 0) {
      gapAlert.classList.add('hidden');
      return;
    }
    gapAlert.classList.remove('hidden');
    document.getElementById('gaps-count').textContent = `${gaps.length} slot${gaps.length !== 1 ? 's' : ''} unfilled`;
    const list = document.getElementById('gaps-list');
    list.innerHTML = gaps.slice(0, 5).map(g => `<p class="text-xs">• ${g.role.name} — ${RosterGrid.formatDateTime(g.session.dateTime)}</p>`).join('');
  }

  function openAssignModal(sessionId, roleId, session, role) {
    currentAssignSlot = { sessionId, roleId };
    document.getElementById('assign-modal-slot').textContent = `${role.name} for ${RosterGrid.typeLabel(session.type)} (${session.venue})`;
    const personSelect = document.getElementById('assign-person');
    const ledger = Roster.getLedger();
    personSelect.innerHTML = '<option value="">Choose...</option>' + ledger.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    document.getElementById('assign-notes').value = '';
    document.getElementById('assign-modal').classList.remove('hidden');
  }

  document.addEventListener('DOMContentLoaded', () => {
    ensureData();
    renderSessions();
    renderRoles();
    renderRoster();

    /* Add Session */
    document.getElementById('add-session-btn').addEventListener('click', () => {
      document.getElementById('session-modal').classList.remove('hidden');
    });
    document.getElementById('close-session-modal').addEventListener('click', () => {
      document.getElementById('session-modal').classList.add('hidden');
    });
    document.getElementById('confirm-session-modal').addEventListener('click', () => {
      const dt = document.getElementById('session-datetime').value;
      const type = document.getElementById('session-type').value;
      const label = document.getElementById('session-label').value.trim();
      const venue = document.getElementById('session-venue').value.trim();
      if (dt && type && venue) {
        RosterGrid.addSession(dt, type, label, venue);
        renderSessions();
        renderRoster();
        document.getElementById('session-modal').classList.add('hidden');
      }
    });

    /* Add Role */
    document.getElementById('add-role-btn').addEventListener('click', () => {
      document.getElementById('role-modal').classList.remove('hidden');
    });
    document.getElementById('close-role-modal').addEventListener('click', () => {
      document.getElementById('role-modal').classList.add('hidden');
    });
    document.getElementById('confirm-role-modal').addEventListener('click', () => {
      const name = document.getElementById('role-name').value.trim();
      const color = document.getElementById('role-color').value;
      if (name) {
        RosterGrid.addRole(name, color);
        renderRoles();
        renderRoster();
        document.getElementById('role-modal').classList.add('hidden');
      }
    });

    /* Assign */
    document.getElementById('close-assign-modal').addEventListener('click', () => {
      document.getElementById('assign-modal').classList.add('hidden');
    });
    document.getElementById('confirm-assign-modal').addEventListener('click', () => {
      const personId = document.getElementById('assign-person').value;
      const notes = document.getElementById('assign-notes').value.trim();
      if (personId && currentAssignSlot) {
        RosterGrid.assign(currentAssignSlot.sessionId, currentAssignSlot.roleId, personId, notes);
        renderRoster();
        document.getElementById('assign-modal').classList.add('hidden');
      }
    });
  });
</script>
</body>
</html>
