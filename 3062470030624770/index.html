<!doctype html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=1280, initial-scale=1.0'><title>Kingsley Dashboard</title><link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Outfit:wght@400;500;600&display=swap' rel='stylesheet'><style>:root{--bg-base:#0D0F14;--bg-card:#161A23;--bg-cork:#111418;--accent-todo-y:#FBBF24;--accent-todo-g:#4ADE80;--accent-todo-b:#60A5FA;--accent-todo-p:#F472B6;--accent-cal:#60A5FA;--accent-bus:#FBBF24;--accent-safe:#4ADE80;--accent-danger:#F87171;--text-primary:#F1F0EC;--text-secondary:#8A8F9E;--text-dim:#3D4255;--border:#1F2535}*{box-sizing:border-box}html,body{margin:0;width:1280px;height:800px;overflow:hidden;background:var(--bg-base);color:var(--text-primary);font-family:Outfit,sans-serif}.top{height:100px;padding:0 40px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}.clock{display:flex;align-items:center;gap:12px}.dot{width:8px;height:8px;border-radius:50%;background:var(--accent-danger);animation:pulse 1s infinite}.time{font:300 72px/1 'DM Mono'}.day{font:600 11px Outfit;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.12em}.full{font:400 16px Outfit}.greeting{font:400 18px Outfit;color:var(--text-secondary)}.main{display:flex;height:700px}.left,.center,.right{overflow:hidden}.left{width:340px;border-right:1px solid var(--border);background-color:var(--bg-cork);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E")}.center{width:580px;border-right:1px solid var(--border);padding:28px}.right{width:360px;padding:20px 24px}.label{font:600 11px Outfit;color:var(--text-dim);text-transform:uppercase;letter-spacing:.12em}.line{height:1px;background:var(--border);margin-top:10px}.tab{padding:4px 12px;border-radius:20px;min-height:44px;font:600 11px Outfit;display:flex;align-items:center;border:1px solid var(--border);cursor:pointer}.tab.active{background:var(--accent-bus);color:#0D0F14;border-color:var(--accent-bus)}.tab.inactive{background:transparent;color:var(--text-dim)}.note{width:280px;min-height:100px;max-height:160px;overflow:hidden;border-radius:4px;padding:14px 16px 16px;cursor:pointer}.note+.note{margin-top:-12px}.tape{width:48px;height:8px;border-radius:2px;margin:0 auto 12px;background:rgba(255,255,255,.06)}.done{opacity:.3}.done .text{text-decoration:line-through}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}@keyframes danger-pulse{0%,100%{background:rgba(248,113,113,.08)}50%{background:rgba(248,113,113,.18)}}.bus-row-critical{animation:danger-pulse 1s infinite}</style></head><body><div class='top'><div class='clock'><span class='dot'></span><div id='clock' class='time'>--:--:--</div><div style='margin-left:20px'><div id='day' class='day'></div><div id='date' class='full'></div></div></div><div id='greeting' class='greeting'></div></div><div class='main'><section class='left'><div style='padding:24px 28px 0'><div class='label'>TASKS</div><div class='line'></div></div><div id='tasks' style='padding:32px 28px'></div></section><section class='center'><div class='label'>TODAY</div><div id='calendar'></div></section><section class='right'><div style='display:flex;justify-content:space-between;align-items:center'><div class='label'>BUS <span id='stale' style='display:none'>· stale</span></div><div style='display:flex;gap:8px'><button id='etaTab' class='tab active'>ETA</button><button id='journeyTab' class='tab inactive'>JOURNEY</button></div></div><div id='journeyTabs' style='display:none;gap:8px;margin-top:10px;flex-wrap:wrap'></div><div id='bus'></div></section></div><script>const TZ='Asia/Hong_Kong',BUS_STOPS=[{name:'STOP NAME 1',stops:[{stopId:'XXXXXXXXXX',route:'XX',serviceType:1}]},{name:'STOP NAME 2',stops:[{stopId:'XXXXXXXXXX',route:'XX',serviceType:1}]}],JOURNEYS=[{label:'To School',route:'12A',direction:'outbound',serviceType:1,departureStopId:'XXXXXXXXXX',arrivalStopId:'XXXXXXXXXX'}];let mode='eta',activeJourney=0,done=new Set();const $=id=>document.getElementById(id),fmt=i=>new Date(i).toLocaleTimeString('en-GB',{timeZone:TZ,hour:'2-digit',minute:'2-digit',hour12:false});function tick(){const d=new Date(),h=+d.toLocaleString('en-US',{timeZone:TZ,hour:'numeric',hour12:false});$('clock').textContent=d.toLocaleTimeString('en-GB',{timeZone:TZ,hour12:false});$('day').textContent=d.toLocaleString('en-US',{timeZone:TZ,weekday:'short'});$('date').textContent=d.toLocaleDateString('en-GB',{timeZone:TZ,day:'numeric',month:'short',year:'numeric'});$('greeting').textContent=`${h<5?'Good night':h<12?'Good morning':h<18?'Good afternoon':'Good evening'}, Kingsley`;}async function loadTasks(){try{const r=await fetch('/api/todoist');if(!r.ok)return;const t=(await r.json()).slice(0,6),rot=[-1.5,.8,-.5,1.2,-1.8,.4],pal=[['#2A2510','#FBBF24'],['#0F2318','#4ADE80'],['#0D1A2A','#60A5FA'],['#2A1020','#F472B6']];$('tasks').innerHTML=t.map((x,i)=>{const c=x.priority===4?['#2A1020','#F472B6']:pal[i%4];return `<article class='note ${done.has(String(x.id))?'done':''}' data-id='${x.id}' style='transform:rotate(${rot[i]}deg);background:${c[0]};border-left:3px solid ${c[1]}'><div class='tape' style='background:${x.isOverdue?'rgba(248,113,113,.3)':'rgba(255,255,255,.06)'}'></div><div class='text' style='font:500 16px Outfit;color:${c[1]}'>${x.content}</div>${x.due?`<div style='font:400 12px DM Mono;color:${x.isOverdue?'var(--accent-danger)':'var(--text-secondary)'}'>${x.due.string||x.due.date}</div>`:''}${x.priority===4?`<div style='font:600 10px Outfit;color:${c[1]}99'>!! URGENT</div>`:x.priority===3?`<div style='font:600 10px Outfit;color:${c[1]}99'>! HIGH</div>`:''}</article>`;}).join('');document.querySelectorAll('.note').forEach(el=>el.onclick=async()=>{const id=el.dataset.id;done.add(id);el.classList.add('done');const rr=await fetch('/api/todoist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({taskId:id})});const j=await rr.json();if(!j.success){done.delete(id);el.classList.remove('done');}});}catch{}}async function loadCal(){try{const r=await fetch('/api/calendar');if(!r.ok)return;const ev=await r.json();if(!ev.length){$('calendar').innerHTML='<div style="height:620px;display:flex;align-items:center;color:var(--text-dim)">No more events today</div>';return;}const all=ev.filter(e=>e.isAllDay),timed=ev.filter(e=>!e.isAllDay),now=Date.now();$('calendar').innerHTML=`<div style='margin:10px 0 20px;display:flex;gap:8px;flex-wrap:wrap'>${all.map(a=>`<span style='background:rgba(96,165,250,.15);border:1px solid rgba(96,165,250,.3);border-radius:4px;padding:3px 10px;font-size:11px;font-weight:600;color:#60A5FA'>ALL DAY ${a.title}</span>`).join('')}</div>${timed.map((e,i)=>`<div style='display:flex;gap:14px;margin-bottom:20px;opacity:${new Date(e.end).getTime()<now?0.35:1};${i===0?'background:var(--bg-card);padding:12px;border-radius:8px;box-shadow:0 0 0 1px var(--border);':''}'><div style='width:3px;background:var(--accent-cal);border-radius:2px'></div><div><div style='font:400 14px DM Mono;color:var(--text-secondary)'>${fmt(e.start)} – ${fmt(e.end)}</div><div style='font:500 18px Outfit'>${e.title}</div>${e.location?`<div style='font:400 13px Outfit;color:var(--text-secondary)'>${e.location}</div>`:''}</div></div>`).join('')}`;}catch{}}async function loadETA(){try{const groups=await Promise.all(BUS_STOPS.slice(0,2).map(async g=>{const rows=(await Promise.all(g.stops.map(async s=>{const r=await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${s.stopId}/${s.route}/${s.serviceType}`);const j=await r.json();return (j.data||[]).slice(0,3).map(x=>({route:s.route,dest:x.dest_en||'',mins:Math.max(0,Math.round((new Date(x.eta)-new Date())/60000))}));}))).flat().slice(0,3);return {name:g.name,rows};}));$('stale').style.display='none';if(mode==='eta')$('bus').innerHTML=groups.map(g=>`<div><div style='font:600 12px Outfit;color:var(--text-secondary);margin-top:12px'>${g.name}</div><div class='line'></div>${g.rows.map(r=>`<div class='${r.mins<=1?'bus-row-critical':''}' style='display:flex;align-items:center;gap:12px;min-height:44px;padding:8px 0'><div style='border:1px solid var(--border);border-radius:6px;min-width:64px;text-align:center;font:500 22px DM Mono;color:var(--accent-bus)'>${r.route}</div><div style='flex:1;font:400 13px Outfit;color:var(--text-secondary)'>${r.dest}</div><div style='font:300 36px DM Mono;color:${r.mins<=3?'var(--accent-danger)':'var(--accent-bus)'}'>${r.mins}m</div></div>`).join('')}</div>`).join('');}catch{$('stale').style.display='inline';}}async function loadJourney(){try{const q=new URLSearchParams(JOURNEYS[activeJourney]);const r=await fetch('/api/kmb-route?'+q);const d=await r.json();if(!r.ok||d.noService||!d.stops?.length){$('bus').innerHTML='<div style="padding:24px;color:var(--text-dim)">No service</div>';return;}const arr=Math.round((new Date(d.stops[d.stops.length-1].projectedTime)-new Date())/60000);$('bus').innerHTML=`<div style='margin-top:12px'>${d.stops.map(s=>`<div style='display:flex;gap:12px;align-items:center;min-height:44px;padding:6px 0'><div style='width:10px;height:10px;border-radius:50%;background:${s.isDeparture?'var(--accent-bus)':s.isArrival?'var(--accent-safe)':'transparent'};border:${s.isDeparture||s.isArrival?'none':'2px solid var(--border)'}'></div><div style='flex:1;font:400 13px Outfit'>${s.nameEn}</div><div style='font:400 13px DM Mono;color:${s.isDeparture?'var(--accent-bus)':s.isArrival?'var(--accent-safe)':'var(--text-secondary)'}'>${fmt(s.projectedTime)}</div></div>`).join('')}<div style='padding-top:10px'><div class='label'>ARRIVES IN</div><div style='font:300 28px DM Mono;color:${arr<=5?'var(--accent-danger)':'var(--accent-safe)'}'>${arr} min</div></div></div>`;}catch{$('bus').innerHTML='<div style="padding:24px;color:var(--text-dim)">No service</div>';}}function tabs(){const c=JOURNEYS.length>1;$('journeyTabs').style.display=c&&mode==='journey'?'flex':'none';if(!c)return;$('journeyTabs').innerHTML=JOURNEYS.map((j,i)=>`<button class='tab ${i===activeJourney?'active':'inactive'}' data-i='${i}'>${j.label}</button>`).join('');document.querySelectorAll('#journeyTabs button').forEach(b=>b.onclick=()=>{activeJourney=+b.dataset.i;tabs();loadJourney();});}$('etaTab').onclick=()=>{mode='eta';$('etaTab').className='tab active';$('journeyTab').className='tab inactive';tabs();loadETA();};$('journeyTab').onclick=()=>{mode='journey';$('journeyTab').className='tab active';$('etaTab').className='tab inactive';tabs();loadJourney();};tick();setInterval(tick,1000);loadTasks();loadCal();loadETA();setInterval(loadTasks,60000);setInterval(loadCal,300000);setInterval(()=>mode==='eta'?loadETA():loadJourney(),30000);</script></body></html>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280, initial-scale=1.0" />
  <title>Kingsley — Morning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Backgrounds */
      --bg-base:   #F0F9FF;   /* sky-50 */
      --bg-card:   #FFFFFF;
      --bg-cork:   #FFFDE7;   /* yellow-50 */
      --border:    #BAE6FD;   /* sky-200 */

      /* Brand accents */
      --blue:      #0EA5E9;   /* sky-500 */
      --blue-lt:   #E0F2FE;   /* sky-100 */
      --yellow:    #FACC15;   /* yellow-400 */
      --yellow-lt: #FEF9C3;   /* yellow-100 */
      --green:     #22C55E;   /* green-500 */
      --rose:      #F43F5E;   /* rose-500 */

      /* Text */
      --text:      #0C4A6E;   /* sky-900 */
      --sub:       #475569;   /* slate-600 */
      --dim:       #94A3B8;   /* slate-400 */

      /* Note palettes */
      --na-bg:  #FFFBEB; --na-acc: #D97706; --na-bdr: #FCD34D;
      --nb-bg:  #F0FDF4; --nb-acc: #16A34A; --nb-bdr: #4ADE80;
      --nc-bg:  #EFF6FF; --nc-acc: #2563EB; --nc-bdr: #60A5FA;
      --nd-bg:  #FFF1F2; --nd-acc: #E11D48; --nd-bdr: #FB7185;

      --font-display: 'DM Mono', monospace;
      --font-body:    'Outfit', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1280px; height: 800px; overflow: hidden;
      background: var(--bg-base);
      color: var(--text);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.25; }
    }
    @keyframes danger-pulse {
      0%,100% { background: rgba(244,63,94,.08); }
      50%      { background: rgba(244,63,94,.18); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: none; }
    }
    @keyframes dataFade { from { opacity: 0.4; } to { opacity: 1; } }
    @keyframes lineGrow { from { height: 0; } to { height: 100%; } }

    /* ── Top bar ───────────────────────────────────────────────────────── */
    .top {
      height: 100px;
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-card);
      border-bottom: 2px solid var(--border);
    }
    .clock-wrap { display: flex; align-items: center; gap: 14px; }
    .live-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--yellow);
      flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
      box-shadow: 0 0 0 3px rgba(250,204,21,.25);
    }
    #clock {
      font-family: var(--font-display);
      font-size: 72px; font-weight: 300; line-height: 1;
      color: var(--blue);
    }
    .date-block { margin-left: 20px; }
    #day  { font: 600 11px var(--font-body); text-transform: uppercase; letter-spacing: .12em; color: var(--dim); }
    #date { font: 400 16px var(--font-body); color: var(--text); }
    #greeting { font: 400 18px var(--font-body); color: var(--sub); }

    /* ── Layout ────────────────────────────────────────────────────────── */
    .main { display: flex; height: 700px; }
    .col  { overflow: hidden; }

    /* ── Left — Notes ──────────────────────────────────────────────────── */
    .col-left {
      width: 500px;
      border-right: 2px solid var(--border);
      background-color: var(--bg-cork);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      animation: fadeUp .4s ease-out both;
    }
    .col-left-header { padding: 24px 28px 0; }
    .section-label {
      font: 600 11px var(--font-body);
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--dim);
    }
    .section-line { height: 2px; background: var(--border); margin-top: 10px; border-radius: 1px; }
    #tasks { padding: 28px 28px; }

    .note {
      width: 400px; min-height: 100px; max-height: 160px;
      overflow: hidden; border-radius: 6px;
      padding: 12px 14px 14px;
      position: relative; cursor: pointer;
      box-shadow: 0 2px 8px rgba(14,165,233,.08), 0 1px 3px rgba(0,0,0,.06);
      transition: box-shadow .2s;
    }
    .note + .note { margin-top: -10px; }
    .note.done { opacity: .35; }
    .note.done .note-text { text-decoration: line-through; }

    .tape {
      width: 48px; height: 8px;
      background: rgba(0,0,0,.08);
      border-radius: 2px;
      margin: 0 auto 10px; display: block;
    }
    .tape.overdue { background: rgba(244,63,94,.3); }
    .tape.faded   { opacity: .2; }

    .note-text     { font: 500 15px var(--font-body); }
    .note-due      { font: 400 11px var(--font-display); color: var(--sub); margin-top: 5px; }
    .note-due.overdue { color: var(--rose); }
    .note-priority { font: 600 10px var(--font-body); text-transform: uppercase; margin-top: 5px; }

    /* ── Centre — Calendar ─────────────────────────────────────────────── */
    .col-center {
      width: 320px;
      border-right: 2px solid var(--border);
      padding: 20px;
      background: var(--bg-card);
      animation: fadeUp .4s ease-out .15s both;
    }
    .all-day-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 20px; }
    .all-day-pill {
      background: var(--blue-lt); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 12px;
      font: 600 11px var(--font-body); color: var(--blue);
    }
    .event-row {
      display: flex; gap: 14px; margin-bottom: 20px;
      border-radius: 10px; transition: opacity .4s;
    }
    .event-row.past    { opacity: .3; }
    .event-row.current {
      background: var(--blue-lt);
      padding: 14px; border: 1.5px solid var(--border);
    }
    .event-bar { width: 4px; background: var(--blue); border-radius: 2px; flex-shrink: 0; }
    .event-time  { font: 400 14px var(--font-display); color: var(--sub); }
    .event-title { font: 600 15px var(--font-body); color: var(--text); }
    .event-loc   { font: 400 13px var(--font-body); color: var(--sub); }
    .no-events {
      height: 580px; display: flex; align-items: center; justify-content: center;
      font: 400 15px var(--font-body); color: var(--dim);
    }

    /* ── Right — Bus ───────────────────────────────────────────────────── */
    .col-right { width: 460px; padding: 20px 24px; background: var(--bg-base); animation: fadeUp .4s ease-out .3s both; }
    .right-header { display: flex; justify-content: space-between; align-items: center; }

    .tab {
      padding: 4px 14px; border-radius: 20px;
      font: 600 11px var(--font-body);
      cursor: pointer; min-height: 44px;
      display: flex; align-items: center;
      border: none; background: transparent;
      transition: all .2s;
    }
    .tab.active   { background: var(--yellow); color: #1A1200; }
    .tab.inactive { color: var(--dim); border: 1.5px solid var(--border); }

    #journey-tabs { display: none; gap: 8px; flex-wrap: wrap; margin: 8px 0; }

    .stop-group  { margin-top: 16px; }
    .stop-label  { font: 600 11px var(--font-body); text-transform: uppercase; letter-spacing: .1em; color: var(--dim); margin-bottom: 6px; }

    .eta-row {
      display: flex; align-items: center; gap: 12px;
      padding: 6px 0; min-height: 44px;
    }
    .bus-row-critical { animation: danger-pulse 1s ease-in-out infinite; border-radius: 8px; padding: 0 4px; }

    .route-badge {
      border: 2px solid var(--yellow);
      border-radius: 8px; padding: 2px 8px;
      font: 500 20px var(--font-display);
      color: var(--text); min-width: 64px; text-align: center; flex-shrink: 0;
      background: var(--yellow-lt);
    }
    .eta-dest { flex: 1; font: 400 13px var(--font-body); color: var(--sub); }
    .eta-mins { font: 300 36px var(--font-display); color: var(--blue); }
    .eta-mins.danger { color: var(--rose); }

    /* ── Journey ───────────────────────────────────────────────────────── */
    .j-stop { display: flex; align-items: center; gap: 12px; min-height: 44px; padding: 4px 0; }
    .j-dot-wrap {
      position: relative; width: 16px;
      display: flex; justify-content: center; align-items: center;
      flex-shrink: 0; align-self: stretch;
    }
    .j-line {
      position: absolute; top: 14px; bottom: -4px;
      width: 2px; background: var(--border);
      animation: lineGrow .6s ease-out forwards;
    }
    .j-dot { border-radius: 50%; position: relative; z-index: 1; }
    .j-dot.dep { width: 12px; height: 12px; background: var(--yellow); box-shadow: 0 0 0 3px rgba(250,204,21,.3); }
    .j-dot.arr { width: 12px; height: 12px; background: var(--blue);   box-shadow: 0 0 0 3px rgba(14,165,233,.2); }
    .j-dot.mid { width: 8px;  height: 8px;  background: var(--bg-card); border: 2px solid var(--border); }

    .j-name { flex: 1; font: 400 13px var(--font-body); color: var(--text); }
    .j-time { font: 400 13px var(--font-display); color: var(--sub); }
    .j-time.dep { color: var(--text); font-weight: 500; }
    .j-time.arr { color: var(--blue); font-weight: 500; }

    .arrives-block { padding-top: 16px; border-top: 2px solid var(--border); margin-top: 8px; }
    .arrives-label { font: 600 11px var(--font-body); text-transform: uppercase; letter-spacing: .12em; color: var(--dim); }
    .arrives-time  { font: 300 32px var(--font-display); color: var(--blue); margin-top: 4px; }
    .arrives-time.danger { color: var(--rose); }

    .info-msg {
      margin-top: 16px; padding: 14px 16px;
      background: var(--yellow-lt); border: 1.5px solid var(--yellow);
      border-radius: 10px; font: 400 13px var(--font-body); color: var(--sub);
      line-height: 1.5;
    }

    #stale { font: 400 11px var(--font-body); color: var(--rose); }

    .setup-link {
      position: fixed; bottom: 14px; right: 18px;
      font: 500 11px var(--font-body);
      color: var(--dim); text-decoration: none; opacity: .5;
    }
  </style>
</head>
<body>

<div class="top">
  <div class="clock-wrap">
    <span class="live-dot"></span>
    <div id="clock"></div>
    <div class="date-block">
      <div id="day"></div>
      <div id="date"></div>
    </div>
  </div>
  <div id="greeting"></div>
</div>

<div class="main">
  <section class="col col-left">
    <div class="col-left-header">
      <div class="section-label">Tasks</div>
      <div class="section-line"></div>
    </div>
    <div id="tasks"></div>
  </section>

  <section class="col col-center">
    <div class="section-label">Today</div>
    <div id="calendar"></div>
  </section>

  <section class="col col-right">
    <div class="right-header">
      <div class="section-label">Bus <span id="stale" style="display:none">· stale</span></div>
      <div style="display:flex;gap:8px">
        <button id="tab-eta"     class="tab active">ETA</button>
        <button id="tab-journey" class="tab inactive">Journey</button>
      </div>
    </div>
    <div id="journey-tabs"></div>
    <div id="bus"></div>
  </section>
</div>

<a class="setup-link" href="/3062470030624770/setup.html">⚙ setup</a>

<script>
// ── USER CONFIG ───────────────────────────────────────────────────────────────
const BUS_STOPS = [
  {
    name: 'Home',
    stops: [
      { stopId: '60F1DDDCB555E319', route: '12A', serviceType: 1 }
    ]
  }
];

const JOURNEYS = [
  {
    label: 'School',
    route: '12A',
    direction: 'outbound',
    serviceType: 1,
    departureStopId: '60F1DDDCB555E319',
    arrivalStopId:   'D3F3BE8469B2F179'
  }
];
// ── END USER CONFIG ───────────────────────────────────────────────────────────

const TZ = 'Asia/Hong_Kong';
let mode = 'eta', activeJourney = 0;
const doneTasks = new Set();
const PLACEHOLDER = 'XXXXXXXXXX';

const NOTE_COLORS = [
  { bg: 'var(--na-bg)', acc: 'var(--na-acc)', bdr: 'var(--na-bdr)' },
  { bg: 'var(--nb-bg)', acc: 'var(--nb-acc)', bdr: 'var(--nb-bdr)' },
  { bg: 'var(--nc-bg)', acc: 'var(--nc-acc)', bdr: 'var(--nc-bdr)' },
  { bg: 'var(--nd-bg)', acc: 'var(--nd-acc)', bdr: 'var(--nd-bdr)' }
];
const NOTE_ROTS = [-1.5, 0.8, -0.5, 1.2, -1.8, 0.4];
const PINK = NOTE_COLORS[3];

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt(iso) {
  return new Date(iso).toLocaleTimeString('en-GB', { timeZone: TZ, hour:'2-digit', minute:'2-digit', hour12:false });
}
function fadeIn(el) {
  el.style.animation = 'none'; void el.offsetWidth;
  el.style.animation = 'dataFade .4s ease';
}
function isPlaceholder(id) { return !id || id === PLACEHOLDER || id.startsWith('X'); }

// ── Clock ─────────────────────────────────────────────────────────────────────
function tickClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-GB', { timeZone: TZ, hour12: false });
}
function tickMeta() {
  const now = new Date();
  const h   = Number(now.toLocaleString('en-US', { timeZone: TZ, hour:'numeric', hour12:false }));
  document.getElementById('greeting').textContent =
    `${h<5?'Good night':h<12?'Good morning':h<18?'Good afternoon':'Good evening'}, Kingsley`;
  document.getElementById('day').textContent =
    now.toLocaleString('en-US', { timeZone: TZ, weekday:'short' }).toUpperCase();
  document.getElementById('date').textContent =
    now.toLocaleDateString('en-GB', { timeZone: TZ, day:'numeric', month:'short', year:'numeric' });
}

// ── Tasks ─────────────────────────────────────────────────────────────────────
async function loadTasks() {
  try {
    const r = await fetch('/api/todoist');
    if (!r.ok) return;
    const tasks = await r.json();
    const container = document.getElementById('tasks');
    if (!Array.isArray(tasks) || !tasks.length) {
      container.innerHTML = '<div style="color:var(--dim);font-size:14px;padding-top:8px">No tasks</div>';
      return;
    }
    container.innerHTML = tasks.slice(0, 6).map((t, i) => {
      const c    = t.priority === 4 ? PINK : NOTE_COLORS[i % 4];
      const rot  = NOTE_ROTS[i] ?? 0;
      const done = doneTasks.has(t.id);
      return `<article class="note${done?' done':''}" data-id="${esc(t.id)}"
                style="background:${c.bg};border-left:4px solid ${c.bdr};transform:rotate(${rot}deg)">
        <span class="tape${t.isOverdue?' overdue':''}${done?' faded':''}"></span>
        <div class="note-text" style="color:${c.acc}">${esc(t.content)}</div>
        ${t.due?`<div class="note-due${t.isOverdue?' overdue':''}">${esc(t.due.string||t.due.date||'')}</div>`:''}
        ${t.priority===4?`<div class="note-priority" style="color:${c.acc}">!! Urgent</div>`:''}
        ${t.priority===3?`<div class="note-priority" style="color:${c.acc}">! High</div>`:''}
      </article>`;
    }).join('');
    container.querySelectorAll('.note').forEach(n => { n.onclick = () => closeTask(n); });
    fadeIn(container);
  } catch (_) {}
}

async function closeTask(el) {
  const id = el.dataset.id;
  if (doneTasks.has(id)) return;
  doneTasks.add(id); el.classList.add('done');
  try {
    const r = await fetch('/api/todoist', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ taskId: id })
    });
    const j = await r.json();
    if (!j.success) { doneTasks.delete(id); el.classList.remove('done'); }
  } catch(_) { doneTasks.delete(id); el.classList.remove('done'); }
}

// ── Calendar ──────────────────────────────────────────────────────────────────
async function loadCalendar() {
  try {
    const r = await fetch('/api/calendar');
    if (!r.ok) return;
    const events = await r.json();
    const cal = document.getElementById('calendar');
    if (!events?.length) {
      cal.innerHTML = '<div class="no-events">Nothing scheduled today</div>';
      return;
    }
    const allDay = events.filter(e => e.isAllDay);
    const timed  = events.filter(e => !e.isAllDay);
    const now    = new Date();
    const hi     = (() => {
      const cur = timed.findIndex(e => new Date(e.start)<=now && new Date(e.end)>now);
      return cur!==-1 ? cur : timed.findIndex(e => new Date(e.start)>now);
    })();
    let html = '';
    if (allDay.length) {
      html += `<div class="all-day-row">${allDay.map(a=>
        `<span class="all-day-pill">All day · ${esc(a.title)}</span>`).join('')}</div>`;
    }
    html += timed.map((e,i) => `
      <div class="event-row${new Date(e.end)<now?' past':''}${i===hi?' current':''}">
        <div class="event-bar"></div>
        <div>
          <div class="event-time">${fmt(e.start)} – ${fmt(e.end)}</div>
          <div class="event-title">${esc(e.title)}</div>
          ${e.location?`<div class="event-loc">${esc(e.location)}</div>`:''}
        </div>
      </div>`).join('');
    cal.innerHTML = html;
    fadeIn(cal);
  } catch(_) {}
}

// ── Bus ETA ───────────────────────────────────────────────────────────────────
async function loadETA() {
  const staleEl = document.getElementById('stale');
  const configured = BUS_STOPS.some(g => g.stops.some(s => !isPlaceholder(s.stopId)));
  if (!configured) {
    document.getElementById('bus').innerHTML =
      '<div class="info-msg">Configure your stop IDs in the <strong>BUS_STOPS</strong> constant, or use the <a href="/3062470030624770/setup.html">setup page</a> to find them.</div>';
    return;
  }
  try {
    const groups = await Promise.all(BUS_STOPS.slice(0,2).map(async g => {
      const rows = (await Promise.all(
        g.stops.filter(s => !isPlaceholder(s.stopId)).map(async s => {
          const j = await fetch(
            `https://data.etabus.gov.hk/v1/transport/kmb/eta/${s.stopId}/${s.route}/${s.serviceType}`
          ).then(r=>r.json());
          return (j.data||[]).slice(0,3).map(x=>({
            route:s.route, dest:x.dest_en||'',
            mins:Math.max(0,Math.round((new Date(x.eta)-new Date())/60000))
          }));
        })
      )).flat();
      return { name:g.name, rows:rows.slice(0,3) };
    }));
    staleEl.style.display = 'none';
    if (mode==='eta') renderETA(groups);
  } catch(_) {
    staleEl.style.display = 'inline';
    if (mode==='eta') renderETA([]);
  }
}

function renderETA(groups) {
  const bus = document.getElementById('bus');
  bus.innerHTML = groups.map(g=>`
    <div class="stop-group">
      <div class="stop-label">${esc(g.name)}</div>
      <div class="section-line"></div>
      ${g.rows.map(r=>`
        <div class="eta-row${r.mins<=1?' bus-row-critical':''}">
          <div class="route-badge">${esc(r.route)}</div>
          <div class="eta-dest">${esc(r.dest)}</div>
          <div class="eta-mins${r.mins<=3?' danger':''}">${r.mins}m</div>
        </div>`).join('')}
    </div>`).join('');
  fadeIn(bus);
}

// ── Journey ───────────────────────────────────────────────────────────────────
async function loadJourney() {
  const j   = JOURNEYS[activeJourney];
  const bus = document.getElementById('bus');
  if (isPlaceholder(j.departureStopId) || isPlaceholder(j.arrivalStopId)) {
    bus.innerHTML =
      '<div class="info-msg">Configure your <strong>departureStopId</strong> and <strong>arrivalStopId</strong> in the JOURNEYS constant, or use the <a href="/3062470030624770/setup.html">setup page</a>.</div>';
    return;
  }
  try {
    const params = new URLSearchParams({
      route:j.route, direction:j.direction, serviceType:j.serviceType,
      departureStopId:j.departureStopId, arrivalStopId:j.arrivalStopId
    });
    const d = await fetch(`/api/kmb-route?${params}`).then(r=>{
      if(!r.ok) throw new Error();
      return r.json();
    });
    if (d.noService) {
      bus.innerHTML = '<div class="info-msg">No service on this route right now.</div>';
      return;
    }
    const now  = new Date();
    const arrM = Math.max(0, Math.round((new Date(d.stops.at(-1).projectedTime)-now)/60000));
    bus.innerHTML = `<div style="margin-top:8px">
      ${d.stops.map((s,i)=>{
        const last=i===d.stops.length-1;
        const dc=s.isDeparture?'dep':s.isArrival?'arr':'mid';
        const tc=s.isDeparture?'dep':s.isArrival?'arr':'';
        return `<div class="j-stop">
          <div class="j-dot-wrap">
            ${!last?'<div class="j-line"></div>':''}
            <div class="j-dot ${dc}"></div>
          </div>
          <div class="j-name">${esc(s.nameEn)}</div>
          <div class="j-time ${tc}">${fmt(s.projectedTime)}</div>
        </div>`;
      }).join('')}
      <div class="arrives-block">
        <div class="arrives-label">Arrives in</div>
        <div class="arrives-time${arrM<=5?' danger':''}">${arrM} min</div>
      </div>
    </div>`;
    fadeIn(bus);
  } catch(_) {
    bus.innerHTML = '<div class="info-msg">Unable to load journey data.</div>';
  }
}

function renderJourneyTabs() {
  const c = document.getElementById('journey-tabs');
  if (JOURNEYS.length<=1) { c.style.display='none'; return; }
  c.style.display='flex';
  c.innerHTML = JOURNEYS.map((j,i)=>
    `<button class="tab ${i===activeJourney?'active':'inactive'}" data-i="${i}">${esc(j.label)}</button>`
  ).join('');
  c.querySelectorAll('button').forEach(b=>{
    b.onclick=()=>{ activeJourney=+b.dataset.i; renderJourneyTabs(); loadJourney(); };
  });
}

// ── Mode switch ───────────────────────────────────────────────────────────────
document.getElementById('tab-eta').onclick = () => {
  mode='eta';
  document.getElementById('tab-eta').className     = 'tab active';
  document.getElementById('tab-journey').className = 'tab inactive';
  document.getElementById('journey-tabs').style.display = 'none';
  loadETA();
};
document.getElementById('tab-journey').onclick = () => {
  mode='journey';
  document.getElementById('tab-journey').className = 'tab active';
  document.getElementById('tab-eta').className     = 'tab inactive';
  renderJourneyTabs();
  loadJourney();
};

// ── Init ──────────────────────────────────────────────────────────────────────
tickClock(); tickMeta();
setInterval(tickClock, 1000);
setInterval(tickMeta,  60000);
loadTasks(); loadCalendar(); loadETA();
setInterval(loadTasks,    60000);
setInterval(loadCalendar, 300000);
setInterval(()=>mode==='eta'?loadETA():loadJourney(), 30000);
</script>
</body>
</html>
