<body>
  <div class="top">
    <div style="display:flex;align-items:center;gap:12px"><span class="dot"></span><div id="clock" style="font:300 72px 'DM Mono';line-height:1">--:--:--</div><div style="margin-left:20px"><div id="day" style="font:600 11px Outfit;color:var(--sub)"></div><div id="date"></div></div></div>

    <section class="left"><div class="label">TASKS</div><div class="line"></div><div id="tasks" style="padding-top:20px"></div></section>
    <section class="center"><div class="label">TODAY</div><div id="calendar"></div></section>

  <script>
    const TZ='Asia/Hong_Kong';
    const BUS_STOPS=[{name:'STOP NAME 1',stops:[{stopId:'XXXXXXXXXX',route:'XX',serviceType:1}]},{name:'STOP NAME 2',stops:[{stopId:'XXXXXXXXXX',route:'XX',serviceType:1}]}];
    const fmt=(v)=>new Date(v).toLocaleTimeString('en-GB',{timeZone:TZ,hour:'2-digit',minute:'2-digit',hour12:false});
    const el={clock:document.getElementById('clock'),day:document.getElementById('day'),date:document.getElementById('date'),greeting:document.getElementById('greeting'),tasks:document.getElementById('tasks'),calendar:document.getElementById('calendar'),stale:document.getElementById('stale'),bus:document.getElementById('bus')};
    function tick(){const d=new Date();const h=+d.toLocaleString('en-US',{timeZone:TZ,hour:'numeric',hour12:false});el.clock.textContent=d.toLocaleTimeString('en-GB',{timeZone:TZ,hour12:false});el.day.textContent=d.toLocaleString('en-US',{timeZone:TZ,weekday:'short'});el.date.textContent=d.toLocaleDateString('en-GB',{timeZone:TZ,day:'numeric',month:'short',year:'numeric'});el.greeting.textContent=`${h<5?'Good night':h<12?'Good morning':h<18?'Good afternoon':'Good evening'}, Kingsley`;}
    async function loadTasks(){try{const r=await fetch('/api/todoist');if(!r.ok)return;const t=await r.json();el.tasks.innerHTML=(t||[]).slice(0,6).map(x=>`<div style="background:#2A2510;border-left:3px solid #FBBF24;border-radius:4px;padding:10px 12px;margin-bottom:8px">${x.content||''}</div>`).join('')}catch{}}
    async function loadCal(){try{const r=await fetch('/api/calendar');if(!r.ok)return;const ev=await r.json();if(!ev?.length){el.calendar.innerHTML='<div style="color:var(--dim);padding-top:40px">No more events today</div>';return;}el.calendar.innerHTML=ev.map(e=>`<div style="margin-top:14px"><div style="font:400 14px 'DM Mono';color:var(--sub)">${fmt(e.start)} – ${fmt(e.end)}</div><div style="font:500 18px Outfit">${e.title}</div></div>`).join('')}catch{}}
    async function loadBus(){try{const groups=await Promise.all(BUS_STOPS.slice(0,2).map(async g=>{const rows=[];for(const s of g.stops){const r=await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${s.stopId}/${s.route}/${s.serviceType}`);const j=await r.json();(j.data||[]).slice(0,3).forEach(x=>rows.push({route:s.route,dest:x.dest_en||'',mins:Math.max(0,Math.round((new Date(x.eta)-new Date())/60000))}));}return {name:g.name,rows:rows.slice(0,3)};}));el.stale.style.display='none';el.bus.innerHTML=groups.map(g=>`<div style="margin-top:12px"><div style="font:600 12px Outfit;color:var(--sub)">${g.name}</div>${g.rows.map(r=>`<div style="display:flex;justify-content:space-between;min-height:44px;align-items:center"><span>${r.route}</span><span>${r.dest}</span><span>${r.mins}m</span></div>`).join('')}</div>`).join('')}catch{el.stale.style.display='inline'}}
    function tick(){const d=new Date();const h=+d.toLocaleString('en-US',{timeZone:TZ,hour:'numeric',hour12:false});clock.textContent=d.toLocaleTimeString('en-GB',{timeZone:TZ,hour12:false});day.textContent=d.toLocaleString('en-US',{timeZone:TZ,weekday:'short'});date.textContent=d.toLocaleDateString('en-GB',{timeZone:TZ,day:'numeric',month:'short',year:'numeric'});greeting.textContent=`${h<5?'Good night':h<12?'Good morning':h<18?'Good afternoon':'Good evening'}, Kingsley`;}
    async function loadTasks(){try{const r=await fetch('/api/todoist');if(!r.ok)return;const t=await r.json();tasks.innerHTML=(t||[]).slice(0,6).map(x=>`<div style="background:#2A2510;border-left:3px solid #FBBF24;border-radius:4px;padding:10px 12px;margin-bottom:8px">${x.content||''}</div>`).join('')}catch{}}
    async function loadCal(){try{const r=await fetch('/api/calendar');if(!r.ok)return;const ev=await r.json();if(!ev?.length){calendar.innerHTML='<div style="color:var(--dim);padding-top:40px">No more events today</div>';return;}calendar.innerHTML=ev.map(e=>`<div style="margin-top:14px"><div style="font:400 14px 'DM Mono';color:var(--sub)">${fmt(e.start)} – ${fmt(e.end)}</div><div style="font:500 18px Outfit">${e.title}</div></div>`).join('')}catch{}}
    async function loadBus(){try{const groups=await Promise.all(BUS_STOPS.slice(0,2).map(async g=>{const rows=[];for(const s of g.stops){const r=await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${s.stopId}/${s.route}/${s.serviceType}`);const j=await r.json();(j.data||[]).slice(0,3).forEach(x=>rows.push({route:s.route,dest:x.dest_en||'',mins:Math.max(0,Math.round((new Date(x.eta)-new Date())/60000))}));}return {name:g.name,rows:rows.slice(0,3)};}));stale.style.display='none';bus.innerHTML=groups.map(g=>`<div style="margin-top:12px"><div style="font:600 12px Outfit;color:var(--sub)">${g.name}</div>${g.rows.map(r=>`<div style="display:flex;justify-content:space-between;min-height:44px;align-items:center"><span>${r.route}</span><span>${r.dest}</span><span>${r.mins}m</span></div>`).join('')}</div>`).join('')}catch{stale.style.display='inline'}}
    tick();setInterval(tick,1000);loadTasks();loadCal();loadBus();setInterval(loadTasks,60000);setInterval(loadCal,300000);setInterval(loadBus,30000);
  </script>
</body>

<div class="main">
  <section class="col left"><div style="padding:24px 28px 0"><div class="label">TASKS</div><div class="line"></div></div><div id="tasks"></div></section>

<script>
const TZ='Asia/Hong_Kong',BUS_STOPS=[{name:'STOP NAME 1',stops:[{stopId:'XXXXXXXXXX',route:'XX',serviceType:1}]},{name:'STOP NAME 2',stops:[{stopId:'XXXXXXXXXX',route:'XX',serviceType:1}]}],JOURNEYS=[{label:'To School',route:'12A',direction:'outbound',serviceType:1,departureStopId:'XXXXXXXXXX',arrivalStopId:'XXXXXXXXXX'}];
let mode='eta',doneTasks=new Set(),activeJourney=0,busStale=false;
const $=id=>document.getElementById(id);
function timeTick(){const n=new Date();$('clock').textContent=n.toLocaleTimeString('en-GB',{timeZone:TZ,hour12:false});const h=Number(n.toLocaleString('en-US',{timeZone:TZ,hour:'numeric',hour12:false}));$('greeting').textContent=`${h<5?'Good night':h<12?'Good morning':h<18?'Good afternoon':'Good evening'}, Kingsley`;$('day').textContent=n.toLocaleString('en-US',{timeZone:TZ,weekday:'short'});$('date').textContent=n.toLocaleDateString('en-GB',{timeZone:TZ,day:'numeric',month:'short',year:'numeric'})}
async function loadTasks(){const r=await fetch('/api/todoist');const t=await r.json();const arr=t.slice(0,6);$('tasks').innerHTML=arr.map((x,i)=>{const p=x.priority===4;const c=p?['#2A1020','#F472B6']:([['#2A2510','#FBBF24'],['#0F2318','#4ADE80'],['#0D1A2A','#60A5FA'],['#2A1020','#F472B6']][i%4]);const ro=[-1.5,.8,-.5,1.2,-1.8,.4][i];return `<article class='note ${doneTasks.has(x.id)?'done':''}' data-id='${x.id}' style='background:${c[0]};border-left:3px solid ${c[1]};transform:rotate(${ro}deg)'><span class='tape' style='background:${x.isOverdue?'rgba(248,113,113,.3)':'rgba(255,255,255,.06)'}'></span><div class='text' style='font:500 16px Outfit;color:${c[1]}'>${x.content}</div>${x.due?`<div style='font:400 12px DM Mono;color:${x.isOverdue?'var(--accent-danger)':'var(--text-secondary)'}'>${x.due.string||x.due.date}</div>`:''}${x.priority===4?`<div style='font:600 10px Outfit;color:${c[1]}99'>!! URGENT</div>`:x.priority===3?`<div style='font:600 10px Outfit;color:${c[1]}99'>! HIGH</div>`:''}</article>`}).join('');
[...document.querySelectorAll('.note')].forEach(n=>n.onclick=async()=>{const id=n.dataset.id;doneTasks.add(id);n.classList.add('done');const rr=await fetch('/api/todoist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({taskId:id})});const j=await rr.json();if(!j.success){doneTasks.delete(id);n.classList.remove('done')}})}
async function loadCal(){const r=await fetch('/api/calendar');const ev=await r.json();$('calendar').style.animation='dataFade .4s';if(!ev.length){$('calendar').innerHTML='<div style="height:620px;display:flex;align-items:center;color:var(--text-dim)">No more events today</div>';return}const all=ev.filter(e=>e.isAllDay),timed=ev.filter(e=>!e.isAllDay);$('calendar').innerHTML=`<div style='margin:10px 0 20px;display:flex;gap:8px;flex-wrap:wrap'>${all.map(a=>`<span style="background:rgba(96,165,250,.15);border:1px solid rgba(96,165,250,.3);padding:3px 10px;border-radius:4px;font-size:11px;color:#60A5FA;font-weight:600">ALL DAY ${a.title}</span>`).join('')}</div>${timed.map((e,idx)=>`<div style='display:flex;gap:14px;margin-bottom:20px;opacity:${new Date(e.end)<new Date()?.35:1};${idx===0?'background:var(--bg-card);padding:12px;border-radius:8px;box-shadow:0 0 0 1px var(--border);':''}'><div style='width:3px;background:var(--accent-cal);border-radius:2px'></div><div><div style='font:400 14px DM Mono;color:var(--text-secondary)'>${fmt(e.start)} – ${fmt(e.end)}</div><div style='font:500 18px Outfit'>${e.title}</div><div style='font:400 13px Outfit;color:var(--text-secondary)'>${e.location||''}</div></div></div>`).join('')}`}
const fmt=i=>new Date(i).toLocaleTimeString('en-GB',{timeZone:TZ,hour:'2-digit',minute:'2-digit',hour12:false});
async function loadETA(){try{const groups=await Promise.all(BUS_STOPS.slice(0,2).map(async g=>{const rows=(await Promise.all(g.stops.map(async s=>{const r=await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${s.stopId}/${s.route}/${s.serviceType}`);const j=await r.json();return (j.data||[]).slice(0,3).map(x=>({route:s.route,dest:x.dest_en,mins:Math.max(0,Math.round((new Date(x.eta)-new Date())/60000))}))}))).flat();return {name:g.name,rows:rows.slice(0,3)};}));busStale=false;renderETA(groups)}catch(e){busStale=true;renderETA([])}$('stale').style.display=busStale?'inline':'none'}
function renderETA(groups){$('bus').innerHTML=mode==='eta'?groups.map(g=>`<div><div style='font:600 12px Outfit;color:var(--text-secondary);margin-top:12px'>${g.name}</div><div class='line'></div>${g.rows.map(r=>`<div class='${r.mins<=1?'bus-row-critical':''}' style='display:flex;align-items:center;gap:12px;min-height:44px;padding:8px 0'><div style='border:1px solid var(--border);border-radius:6px;min-width:64px;text-align:center;font:500 22px DM Mono;color:var(--accent-bus)'>${r.route}</div><div style='flex:1;font:400 13px Outfit;color:var(--text-secondary)'>${r.dest||''}</div><div style='font:300 36px DM Mono;color:${r.mins<=3?'var(--accent-danger)':'var(--accent-bus)'}'>${r.mins}m</div></div>`).join('')}</div>`).join(''):'')}
async function loadJourney(){const j=JOURNEYS[activeJourney];const q=new URLSearchParams(j);const r=await fetch('/api/kmb-route?'+q);const d=await r.json();if(d.noService){$('bus').innerHTML='<div style="padding:24px;color:var(--text-dim)">No service</div>';return}const arrM=Math.round((new Date(d.stops.at(-1).projectedTime)-new Date())/60000);$('bus').innerHTML=`<div style='margin-top:12px'>${d.stops.map((s,i)=>`<div style='display:flex;align-items:center;gap:12px;min-height:44px;padding:6px 0'><div style='position:relative;width:16px;display:flex;justify-content:center'>${i<d.stops.length-1?"<div class='journey-line' style='position:absolute;top:14px;width:2px;background:var(--border)'></div>":''}<div style='width:${s.isDeparture||s.isArrival?10:8}px;height:${s.isDeparture||s.isArrival?10:8}px;border-radius:50%;background:${s.isDeparture?'var(--accent-bus)':s.isArrival?'var(--accent-safe)':'transparent'};border:${s.isDeparture||s.isArrival?'none':'2px solid var(--border)'}'></div></div><div style='flex:1;font:400 13px Outfit'>${s.nameEn}</div><div style='font:400 13px DM Mono;color:${s.isDeparture?'var(--accent-bus)':s.isArrival?'var(--accent-safe)':'var(--text-secondary)'}'>${fmt(s.projectedTime)}</div></div>`).join('')}<div style='padding-top:10px'><div class='label'>ARRIVES IN</div><div style='font:300 28px DM Mono;color:${arrM<=5?'var(--accent-danger)':'var(--accent-safe)'}'>${arrM} min</div></div></div>`}
function renderJourneyTabs(){if(JOURNEYS.length<=1){$('journeyTabs').style.display='none';return}$('journeyTabs').style.display='flex';$('journeyTabs').innerHTML=JOURNEYS.map((j,i)=>`<button class='tab ${i===activeJourney?'active':'inactive'}' data-i='${i}'>${j.label}</button>`).join('');[...$('journeyTabs').querySelectorAll('button')].forEach(b=>b.onclick=()=>{activeJourney=Number(b.dataset.i);loadJourney();renderJourneyTabs()})}
$('etaTab').onclick=()=>{mode='eta';$('etaTab').className='tab active';$('journeyTab').className='tab inactive';$('journeyTabs').style.display='none';loadETA()};$('journeyTab').onclick=()=>{mode='journey';$('journeyTab').className='tab active';$('etaTab').className='tab inactive';renderJourneyTabs();loadJourney()};
timeTick();setInterval(timeTick,1000);loadTasks();loadCal();loadETA();setInterval(loadTasks,60000);setInterval(loadCal,300000);setInterval(()=>mode==='eta'?loadETA():loadJourney(),30000);
</script>
