ng:20px 24px}.label{font:600 11px Outfit;color:var(--text-dim);text-transform:uppercase;letter-spacing:.12em}.line{height:1px;background:var(--border);margin-top:10px}.tab{padding:4px 12px;border-radius:20px;min-height:44px;font:600 11px Outfit;display:flex;align-items:center;border:1px solid var(--border);cursor:pointer}.tab.active{background:var(--accent-bus);color:#0D0F14;border-color:var(--accent-bus)}.tab.inactive{background:transparent;color:var(--text-dim)}.note{width:280px;min-height:100px;max-height:160px;overflow:hidden;border-radius:4px;padding:14px 16px 16px;cursor:pointer}.note+.note{margin-top:-12px}.tape{width:48px;height:8px;border-radius:2px;margin:0 auto 12px;background:rgba(255,255,255,.06)}.done{opacity:.3}.done .text{text-decoration:line-through}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}@keyframes danger-pulse{0%,100%{background:rgba(248,113,113,.08)}50%{background:rgba(248,113,113,.18)}}.bus-row-critical{animation:danger-pulse 1s infinite}</style></head><body><div class='top'><div class='clock'><span class='dot'></span><div id='clock' class='time'>--:--:--</div><div style='margin-left:20px'><div id='day' class='day'></div><div id='date' class='full'></div></div></div><div id='greeting' class='greeting'></div></div><div class='main'><section class='left'><div style='padding:24px 28px 0'><div class='label'>TASKS</div><div class='line'></div></div><div id='tasks' style='padding:32px 28px'></div></section><section class='center'><div class='label'>TODAY</div><div id='calendar'></div></section><section class='right'><div style='display:flex;justify-content:space-between;align-items:center'><div class='label'>BUS <span id='stale' style='display:none'>· stale</span></div><div style='display:flex;gap:8px'><button id='etaTab' class='tab active'>ETA</button><button id='journeyTab' class='tab inactive'>JOURNEY</button></div></div><div id='journeyTabs' style='display:none;gap:8px;margin-top:10px;flex-wrap:wrap'></div><div id='bus'></div></section></div><script>const TZ='Asia/Hong_Kong',BUS_STOPS=[{name:'STOP NAME 1',stops:[{stopId:'XXXXXXXXXX',route:'XX',serviceType:1}]},{name:'STOP NAME 2',stops:[{stopId:'XXXXXXXXXX',route:'XX',serviceType:1}]}],JOURNEYS=[{label:'To School',route:'12A',direction:'outbound',serviceType:1,departureStopId:'XXXXXXXXXX',arrivalStopId:'XXXXXXXXXX'}];let mode='eta',activeJourney=0,done=new Set();const $=id=>document.getElementById(id),fmt=i=>new Date(i).toLocaleTimeString('en-GB',{timeZone:TZ,hour:'2-digit',minute:'2-digit',hour12:false});function tick(){const d=new Date(),h=+d.toLocaleString('en-US',{timeZone:TZ,hour:'numeric',hour12:false});$('clock').textContent=d.toLocaleTimeString('en-GB',{timeZone:TZ,hour12:false});$('day').textContent=d.toLocaleString('en-US',{timeZone:TZ,weekday:'short'});$('date').textContent=d.toLocaleDateString('en-GB',{timeZone:TZ,day:'numeric',month:'short',year:'numeric'});$('greeting').textContent=`${h<5?'Good night':h<12?'Good morning':h<18?'Good afternoon':'Good evening'}, Kingsley`;}async function loadTasks(){try{const r=await fetch('/api/todoist');if(!r.ok)return;const t=(await r.json()).slice(0,6),rot=[-1.5,.8,-.5,1.2,-1.8,.4],pal=[['#2A2510','#FBBF24'],['#0F2318','#4ADE80'],['#0D1A2A','#60A5FA'],['#2A1020','#F472B6']];$('tasks').innerHTML=t.map((x,i)=>{const c=x.priority===4?['#2A1020','#F472B6']:pal[i%4];return `<article class='note ${done.has(String(x.id))?'done':''}' data-id='${x.id}' style='transform:rotate(${rot[i]}deg);background:${c[0]};border-left:3px solid ${c[1]}'><div class='tape' style='background:${x.isOverdue?'rgba(248,113,113,.3)':'rgba(255,255,255,.06)'}'></div><div class='text' style='font:500 16px Outfit;color:${c[1]}'>${x.content}</div>${x.due?`<div style='font:400 12px DM Mono;color:${x.isOverdue?'var(--accent-danger)':'var(--text-secondary)'}'>${x.due.string||x.due.date}</div>`:''}${x.priority===4?`<div style='font:600 10px Outfit;color:${c[1]}99'>!! URGENT</div>`:x.priority===3?`<div style='font:600 10px Outfit;color:${c[ t_en||'',mins:Math.max(0,Math.round((new Date(x.eta)-new Date())/60000))}));}))).flat().slice(0,3);return {name:g.name,rows};}));$('stale').style.display='none';if(mode==='eta')$('bus').innerHTML=groups.map(g=>`<div><div style='font:600 12px Outfit;color:var(--text-secondary);margin-top:12px'>${g.name}</div><div class='line'></div>${g.rows.map(r=>`<div class='${r.mins<=1?'bus-row-critical':''}' style='display:flex;align-items:center;gap:12px;min-height:44px;padding:8px 0'><div style='border:1px solid var(--border);border-radius:6px;min-width:64px;text-align:center;font:500 22px DM Mono;color:var(--accent-bus)'>${r.route}</div><div style='flex:1;font:400 13px Outfit;color:var(--text-secondary)'>${r.dest}</div><div style='font:300 36px DM Mono;color:${r.mins<=3?'var(--accent-danger)':'var(--accent-bus)'}'>${r.mins}m</div></div>`).join('')}</div>`).join('');}catch{$('stale').style.display='inline';}}async function loadJourney(){try{const q=new URLSearchParams(JOURNEYS[activeJourney]);const r=await fetch('/api/kmb-route?'+q);const d=await r.json();if(!r.ok||d.noService||!d.stops?.length){$('bus').innerHTML='<div style="padding:24px;color:var(--text-dim)">No service</div>';return;}const arr=Math.round((new Date(d.stops[d.stops.length-1].projectedTime)-new Date())/60000);$('bus').innerHTML=`<div style='margin-top:12px'>${d.stops.map(s=>`<div style='display:flex;gap:12px;align-items:center;min-height:44px;padding:6px 0'><div style='width:10px;height:10px;border-radius:50%;background:${s.isDeparture?'var(--accent-bus)':s.isArrival?'var(--accent-safe)':'transparent'};border:${s.isDeparture||s.isArrival?'none':'2px solid var(--border)'}'></div><div style='flex:1;font:400 13px Outfit'>${s.nameEn}</div><div style='font:400 13px DM Mono;color:${s.isDeparture?'var(--accent-bus)':s.isArrival?'var(--accent-safe)':'var(--text-secondary)'}'>${fmt(s.projectedTime)}</div></div>`).join('')}<div style='padding-top:10px'><div class='label'>ARRIVES IN</div><div style='font:300 28px DM Mono;color:${arr<=5?'var(--accent-danger)':'var(--accent-safe)'}'>${arr} min</div></div></div>`;}catch{$('bus').innerHTML='<div style="padding:24px;color:var(--text-dim)">No service</div>';}}function tabs(){const c=JOURNEYS.length>1;$('journeyTabs').style.display=c&&mode==='journey'?'flex':'none';if(!c)return;$('journeyTabs').innerHTML=JOURNEYS.map((j,i)=>`<button class='tab ${i===activeJourney?'active':'inactive'}' data-i='${i}'>${j.label}</button>`).join('');document.querySelectorAll('#journeyTabs button').forEach(b=>b.onclick=()=>{activeJourney=+b.dataset.i;tabs();loadJourney();});}$('etaTab').onclick=()=>{mode='eta';$('etaTab').className='tab active';$('journeyTab').className='tab inactive';tabs();loadETA();};$('journeyTab').onclick=()=>{mode='journey';$('journeyTab').className='tab active';$('etaTab').className='tab inactive';tabs();loadJourney();};tick();setInterval(tick,1000);loadTasks();loadCal();loadETA();setInterval(loadTasks,60000);setInterval(loadCal,300000);setInterval(()=>mode==='eta'?loadETA():loadJourney(),30000);</script></body></html>

async function loadETA(){try{const groups=await Promise.all(BUS_STOPS.slice(0,2).map(async g=>{const rows=(await Promise.all(g.stops.map(async s=>{const r=await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${s.stopId}/${s.route}/${s.serviceType}`);const j=await r.json();return (j.data||[]).slice(0,3).map(x=>({route:s.route,dest:x.dest_en,mins:Math.max(0,Math.round((new Date(x.eta)-new Date())/60000))}))}))).flat();return {name:g.name,rows:rows.slice(0,3)};}));busStale=false;renderETA(groups)}catch(e){busStale=true;renderETA([])}$('stale').style.display=busStale?'inline':'none'}
function renderETA(groups){$('bus').innerHTML=mode==='eta'?groups.map(g=>`<div><div style='font:600 12px Outfit;color:var(--text-secondary);margin-top:12px'>${g.name}</div><div class='line'></div>${g.rows.map(r=>`<div class='${r.mins<=1?'bus-row-critical':''}' style='display:flex;align-items:center;gap:12px;min-height:44px;padding:8px 0'><div style='border:1px solid var(--border);border-radius:6px;min-width:64px;text-align:center;font:500 22px DM Mono;color:var(--accent-bus)'>${r.route}</div><div style='flex:1;font:400 13px Outfit;color:var(--text-secondary)'>${r.dest||''}</div><div style='font:300 36px DM Mono;color:${r.mins<=3?'var(--accent-danger)':'var(--accent-bus)'}'>${r.mins}m</div></div>`).join('')}</div>`).join(''):'')}
async function loadJourney(){const j=JOURNEYS[activeJourney];const q=new URLSearchParams(j);const r=await fetch('/api/kmb-route?'+q);const d=await r.json();if(d.noService){$('bus').innerHTML='<div style="padding:24px;color:var(--text-dim)">No service</div>';return}const arrM=Math.round((new Date(d.stops.at(-1).projectedTime)-new Date())/60000);$('bus').innerHTML=`<div style='margin-top:12px'>${d.stops.map((s,i)=>`<div style='display:flex;align-items:center;gap:12px;min-height:44px;padding:6px 0'><div style='position:relative;width:16px;display:flex;justify-content:center'>${i<d.stops.length-1?"<div class='journey-line' style='position:absolute;top:14px;width:2px;background:var(--border)'></div>":''}<div style='width:${s.isDeparture||s.isArrival?10:8}px;height:${s.isDeparture||s.isArrival?10:8}px;border-radius:50%;background:${s.isDeparture?'var(--accent-bus)':s.isArrival?'var(--accent-safe)':'transparent'};border:${s.isDeparture||s.isArrival?'none':'2px solid var(--border)'}'></div></div><div style='flex:1;font:400 13px Outfit'>${s.nameEn}</div><div style='font:400 13px DM Mono;color:${s.isDeparture?'var(--accent-bus)':s.isArrival?'var(--accent-safe)':'var(--text-secondary)'}'>${fmt(s.projectedTime)}</div></div>`).join('')}<div style='padding-top:10px'><div class='label'>ARRIVES IN</div><div style='font:300 28px DM Mono;color:${arrM<=5?'var(--accent-danger)':'var(--accent-safe)'}'>${arrM} min</div></div></div>`}
function renderJourneyTabs(){if(JOURNEYS.length<=1){$('journeyTabs').style.display='none';return}$('journeyTabs').style.display='flex';$('journeyTabs').innerHTML=JOURNEYS.map((j,i)=>`<button class='tab ${i===activeJourney?'active':'inactive'}' data-i='${i}'>${j.label}</button>`).join('');[...$('journeyTabs').querySelectorAll('button')].forEach(b=>b.onclick=()=>{activeJourney=Number(b.dataset.i);loadJourney();renderJourneyTabs()})}
$('etaTab').onclick=()=>{mode='eta';$('etaTab').className='tab active';$('journeyTab').className='tab inactive';$('journeyTabs').style.display='none';loadETA()};$('journeyTab').onclick=()=>{mode='journey';$('journeyTab').className='tab active';$('etaTab').className='tab inactive';renderJourneyTabs();loadJourney()};
timeTick();setInterval(timeTick,1000);loadTasks();loadCal();loadETA();setInterval(loadTasks,60000);setInterval(loadCal,300000);setInterval(()=>mode==='eta'?loadETA():loadJourney(),30000);
</script>
</body></html>
