<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prefect Messenger</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f2f5; --surface: #fff; --border: #e0e0e0;
      --primary: #25d366; --primary-dark: #1da851;
      --text: #1a1a1a; --muted: #6b7280;
      --danger: #ef4444; --radius: 10px;
      --shadow: 0 1px 4px rgba(0,0,0,.08), 0 2px 12px rgba(0,0,0,.06);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px; color: var(--text); background: var(--bg);
    }
    body { min-height: 100vh; background: var(--bg); }
    button { cursor: pointer; font-family: inherit; font-size: inherit; }
    input, textarea { font-family: inherit; font-size: inherit; }

    /* Header */
    .app-header { background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem; display: flex; align-items: center; gap: .75rem;
      box-shadow: var(--shadow); }
    .app-header h1 { font-size: 1.2rem; font-weight: 700; }
    .wa-icon { width: 32px; height: 32px; background: var(--primary); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; }

    /* Layout */
    .app-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;
      padding: 1.5rem; max-width: 1300px; margin: 0 auto; align-items: start; }
    @media (max-width: 768px) { .app-layout { grid-template-columns: 1fr; padding: 1rem; gap: 1rem; } }

    /* Panel */
    .panel { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .panel__header { display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); }
    .panel__title { font-size: 1rem; font-weight: 600; }
    .panel__count { font-size: .8rem; color: var(--muted); margin-left: .4rem; }
    .panel__body { padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }

    /* Buttons */
    .btn-add { background: var(--primary); color: #fff; border: none; border-radius: 6px;
      padding: .45rem .9rem; font-size: .875rem; font-weight: 600;
      display: flex; align-items: center; gap: .35rem; transition: background .15s; }
    .btn-add:hover { background: var(--primary-dark); }
    .btn-cancel { background: none; border: 1px solid var(--border); border-radius: 6px;
      padding: .5rem 1.1rem; font-size: .875rem; color: var(--muted); transition: background .12s; }
    .btn-cancel:hover { background: #f1f5f9; }
    .btn-save { background: var(--primary); border: none; border-radius: 6px;
      padding: .5rem 1.25rem; font-size: .875rem; font-weight: 600; color: #fff; transition: background .15s; }
    .btn-save:hover { background: var(--primary-dark); }
    .btn-save:disabled { opacity: .5; cursor: not-allowed; }
    .btn-reset { background: none; border: 1px solid var(--border); border-radius: 6px;
      padding: .35rem .75rem; font-size: .8rem; color: var(--muted); transition: background .12s, color .12s; }
    .btn-reset:hover { background: #f1f5f9; color: var(--text); }
    .send-all-btn { width: 100%; background: var(--primary); border: none; border-radius: 8px;
      padding: .8rem 1.25rem; font-size: 1rem; font-weight: 700; color: #fff;
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      transition: background .15s, transform .1s; box-shadow: 0 2px 8px rgba(37,211,102,.35); }
    .send-all-btn:hover:not(:disabled) { background: var(--primary-dark); transform: translateY(-1px); }
    .send-all-btn:disabled { opacity: .45; cursor: not-allowed; box-shadow: none; }
    .btn-icon { background: none; border: 1px solid transparent; border-radius: 6px;
      padding: .35rem; display: flex; align-items: center; color: var(--muted);
      transition: background .12s, color .12s, border-color .12s; }
    .btn-icon:hover { background: #f1f5f9; border-color: var(--border); color: var(--text); }
    .btn-icon--danger:hover { background: #fef2f2; border-color: #fecaca; color: var(--danger); }
    .btn-send-one { background: none; border: 1px solid var(--primary); border-radius: 6px;
      padding: .3rem .6rem; color: var(--primary-dark); font-size: .78rem; font-weight: 600;
      transition: background .12s, color .12s; }
    .btn-send-one:hover { background: var(--primary); color: #fff; }
    .btn-send-preview { background: var(--primary); border: none; border-radius: 6px;
      padding: .3rem .75rem; font-size: .78rem; font-weight: 600; color: #fff;
      display: flex; align-items: center; gap: .3rem; transition: background .12s; flex-shrink: 0; }
    .btn-send-preview:hover { background: var(--primary-dark); }

    /* Badge */
    .badge { font-size: .7rem; font-weight: 600; padding: .15rem .5rem; border-radius: 999px;
      text-transform: uppercase; letter-spacing: .04em; }
    .badge--opened { background: #dcfce7; color: #15803d; }
    .badge--pending { background: #f3f4f6; color: var(--muted); }

    /* Prefect Card */
    .prefect-card { background: #f8fafc; border: 1px solid var(--border); border-radius: 8px;
      padding: .85rem 1rem; margin-bottom: .6rem; display: flex; align-items: flex-start; gap: .75rem; }
    .prefect-card__avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--primary);
      color: #fff; font-weight: 700; font-size: .95rem; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; }
    .prefect-card__info { flex: 1; min-width: 0; }
    .prefect-card__name { font-weight: 600; font-size: .95rem; display: flex; align-items: center;
      gap: .5rem; flex-wrap: wrap; }
    .prefect-card__sub { font-size: .8rem; color: var(--muted); margin-top: .15rem; }
    .prefect-card__sub span { color: var(--text); }
    .prefect-card__actions { display: flex; align-items: center; gap: .35rem; flex-shrink: 0; }

    /* Empty state */
    .empty { text-align: center; padding: 2.5rem 1rem; color: var(--muted); }
    .empty__icon { font-size: 2.5rem; margin-bottom: .75rem; }
    .empty p { font-size: .9rem; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4);
      display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
    .modal { background: var(--surface); border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0,0,0,.18); padding: 1.5rem; width: 100%; max-width: 440px; }
    .modal__title { font-size: 1.05rem; font-weight: 700; margin-bottom: 1.25rem; }
    .form-field { margin-bottom: 1rem; }
    .form-field label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: .35rem; }
    .form-field input { width: 100%; border: 1px solid var(--border); border-radius: 6px;
      padding: .55rem .75rem; font-size: .9rem; outline: none; transition: border-color .15s; }
    .form-field input:focus { border-color: var(--primary); }
    .field-hint { font-size: .75rem; color: var(--muted); margin-top: .25rem; }
    .field-warning { font-size: .75rem; color: #f59e0b; margin-top: .25rem; }
    .form-actions { display: flex; justify-content: flex-end; gap: .6rem; margin-top: 1.5rem; }

    /* Template editor */
    .template-editor textarea { width: 100%; min-height: 140px; border: 1px solid var(--border);
      border-radius: 6px; padding: .65rem .75rem; font-size: .875rem; line-height: 1.5;
      resize: vertical; outline: none; transition: border-color .15s; }
    .template-editor textarea:focus { border-color: var(--primary); }
    .chips { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .5rem; }
    .chip { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 999px;
      padding: .2rem .65rem; font-size: .78rem; font-weight: 600; color: #15803d;
      cursor: pointer; font-family: 'SF Mono','Fira Code',monospace; transition: background .12s; }
    .chip:hover { background: #dcfce7; }
    .char-count { font-size: .75rem; color: var(--muted); text-align: right; margin-top: .3rem; }

    /* Preview card */
    .preview-card { background: #f8fafc; border: 1px solid var(--border); border-radius: 8px;
      padding: .85rem 1rem; margin-bottom: .6rem; }
    .preview-card__header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .5rem; }
    .preview-card__name { font-weight: 600; font-size: .9rem; display: flex; align-items: center; gap: .5rem; }
    .preview-card__msg { background: #fff; border: 1px solid #e9ecef; border-radius: 6px;
      padding: .65rem .85rem; font-size: .82rem; line-height: 1.6; white-space: pre-wrap;
      word-break: break-word; max-height: 120px; overflow-y: auto; }

    /* Misc */
    .section-label { font-size: .8rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .05em; color: var(--muted); margin-bottom: .5rem; }
    .popup-warning { background: #fefce8; border: 1px solid #fde68a; border-radius: 6px;
      padding: .65rem .9rem; font-size: .82rem; color: #92400e; }
    .previews-section { border-top: 1px solid var(--border); padding-top: 1rem; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { createElement as h, useState, useEffect, useRef, StrictMode } from 'https://esm.sh/react@18';
import { createRoot } from 'https://esm.sh/react-dom@18/client';

// ─── Constants ───────────────────────────────────────────────────────────────
const KEYS = { CONTACTS: 'prefect_messenger_contacts', TEMPLATE: 'prefect_messenger_template' };
const DEFAULT_TEMPLATE = `Hello {name},\n\nYou are scheduled for duty on *{date}* from *{time}*.\nDuty: {duty}\n\nPlease ensure you are punctual and in full uniform.\n\nThank you.`;
const VARS = ['{name}', '{date}', '{time}', '{duty}'];

// ─── Utils ────────────────────────────────────────────────────────────────────
function getTomorrow() {
  const d = new Date(); d.setDate(d.getDate() + 1);
  return d.toLocaleDateString('en-CA');
}
function fmtDate(iso) {
  if (!iso) return '';
  const [y, m, day] = iso.split('-');
  return new Date(+y, +m - 1, +day).toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}
function resolve(tpl, p, date) {
  return tpl.replace(/{name}/g, p.name||'').replace(/{date}/g, fmtDate(date)||date)
            .replace(/{time}/g, p.dutyTime||'').replace(/{duty}/g, p.dutyDescription||'');
}
function waUrl(p, tpl, date) {
  const phone = p.phone.replace(/\D/g, '');
  return `https://wa.me/${phone}?text=${encodeURIComponent(resolve(tpl, p, date))}`;
}

// ─── useLocalStorage ─────────────────────────────────────────────────────────
function useLocalStorage(key, def) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s !== null ? JSON.parse(s) : def; } catch { return def; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
  return [val, setVal];
}

// ─── Icons ────────────────────────────────────────────────────────────────────
const WaIcon = () => h('svg', { viewBox:'0 0 24 24', width:18, height:18, fill:'white' },
  h('path', { d:'M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z' }));

const EditIcon = () => h('svg', { width:15, height:15, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:2, strokeLinecap:'round', strokeLinejoin:'round' },
  h('path', { d:'M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7' }),
  h('path', { d:'M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z' }));

const TrashIcon = () => h('svg', { width:15, height:15, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:2, strokeLinecap:'round', strokeLinejoin:'round' },
  h('polyline', { points:'3 6 5 6 21 6' }),
  h('path', { d:'M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6' }),
  h('path', { d:'M10 11v6M14 11v6' }),
  h('path', { d:'M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2' }));

const PlusIcon = () => h('svg', { width:14, height:14, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:2.5, strokeLinecap:'round' },
  h('line', { x1:12, y1:5, x2:12, y2:19 }), h('line', { x1:5, y1:12, x2:19, y2:12 }));

// ─── PrefectForm ──────────────────────────────────────────────────────────────
function PrefectForm({ initial, onSave, onCancel }) {
  const [form, setForm] = useState(initial || { name:'', phone:'', dutyTime:'', dutyDescription:'' });
  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));
  const phoneWarn = form.phone && !form.phone.startsWith('+')
    ? 'Phone should start with + and country code (e.g. +233241234567)' : null;
  const canSave = form.name.trim() && form.phone.trim();
  const submit = e => { e.preventDefault(); if (!canSave) return; onSave({ ...initial, ...form, name: form.name.trim(), phone: form.phone.trim() }); };
  return h('div', { className:'modal-overlay', onClick: e => e.target === e.currentTarget && onCancel() },
    h('div', { className:'modal' },
      h('div', { className:'modal__title' }, initial ? 'Edit Prefect' : 'Add Prefect'),
      h('form', { onSubmit: submit },
        h('div', { className:'form-field' },
          h('label', null, 'Name *'),
          h('input', { value: form.name, onChange: e => set('name', e.target.value), placeholder:'e.g. Alice Mensah', autoFocus: true })),
        h('div', { className:'form-field' },
          h('label', null, 'Phone Number *'),
          h('input', { value: form.phone, onChange: e => set('phone', e.target.value), placeholder:'+[country code][number] e.g. +233241234567' }),
          phoneWarn ? h('div', { className:'field-warning' }, phoneWarn)
                    : h('div', { className:'field-hint' }, 'Include country code with + prefix')),
        h('div', { className:'form-field' },
          h('label', null, 'Duty Time'),
          h('input', { value: form.dutyTime, onChange: e => set('dutyTime', e.target.value), placeholder:'e.g. 07:00 AM – 09:00 AM' })),
        h('div', { className:'form-field' },
          h('label', null, 'Duty Description'),
          h('input', { value: form.dutyDescription, onChange: e => set('dutyDescription', e.target.value), placeholder:'e.g. Gate duty, main entrance' })),
        h('div', { className:'form-actions' },
          h('button', { type:'button', className:'btn-cancel', onClick: onCancel }, 'Cancel'),
          h('button', { type:'submit', className:'btn-save', disabled: !canSave }, initial ? 'Save Changes' : 'Add Prefect')))));
}

// ─── PrefectCard ──────────────────────────────────────────────────────────────
function PrefectCard({ prefect: p, status, onEdit, onDelete, onSendOne }) {
  const initials = p.name.split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
  return h('div', { className:'prefect-card' },
    h('div', { className:'prefect-card__avatar' }, initials),
    h('div', { className:'prefect-card__info' },
      h('div', { className:'prefect-card__name' }, p.name,
        h('span', { className:`badge badge--${status||'pending'}` }, status === 'opened' ? 'Opened' : 'Pending')),
      h('div', { className:'prefect-card__sub' }, p.phone),
      p.dutyTime && h('div', { className:'prefect-card__sub' }, 'Time: ', h('span', null, p.dutyTime)),
      p.dutyDescription && h('div', { className:'prefect-card__sub' }, 'Duty: ', h('span', null, p.dutyDescription))),
    h('div', { className:'prefect-card__actions' },
      h('button', { className:'btn-send-one', onClick: () => onSendOne(p), title:'Send WhatsApp message' }, 'Send'),
      h('button', { className:'btn-icon', onClick: () => onEdit(p), title:'Edit' }, h(EditIcon)),
      h('button', { className:'btn-icon btn-icon--danger', onClick: () => onDelete(p.id), title:'Remove' }, h(TrashIcon))));
}

// ─── PrefectsPanel ────────────────────────────────────────────────────────────
function PrefectsPanel({ prefects, sendStatus, onAdd, onEdit, onDelete, onSendOne }) {
  const [showForm, setShowForm] = useState(false);
  const [editTarget, setEditTarget] = useState(null);
  return h('section', { className:'panel' },
    h('div', { className:'panel__header' },
      h('div', null, h('span', { className:'panel__title' }, 'Prefects'), h('span', { className:'panel__count' }, `(${prefects.length})`)),
      h('button', { className:'btn-add', onClick: () => setShowForm(true) }, h(PlusIcon), 'Add Prefect')),
    h('div', { className:'panel__body', style:{ padding:'1.25rem' } },
      prefects.length === 0
        ? h('div', { className:'empty' }, h('div', { className:'empty__icon' }, '👤'), h('p', null, 'No prefects yet.'), h('p', null, h('strong', null, 'Add Prefect'), ' to get started.'))
        : prefects.map(p => h(PrefectCard, { key: p.id, prefect: p, status: sendStatus[p.id], onEdit: setEditTarget, onDelete, onSendOne }))),
    showForm && h(PrefectForm, { onSave: data => { onAdd(data); setShowForm(false); }, onCancel: () => setShowForm(false) }),
    editTarget && h(PrefectForm, { initial: editTarget, onSave: data => { onEdit(data); setEditTarget(null); }, onCancel: () => setEditTarget(null) }));
}

// ─── TemplateEditor ───────────────────────────────────────────────────────────
function TemplateEditor({ value, onChange }) {
  const ref = useRef(null);
  function insertVar(v) {
    const el = ref.current; if (!el) return;
    const s = el.selectionStart, e = el.selectionEnd;
    const next = value.slice(0, s) + v + value.slice(e);
    onChange(next);
    requestAnimationFrame(() => { el.focus(); el.selectionStart = el.selectionEnd = s + v.length; });
  }
  return h('div', { className:'template-editor' },
    h('div', { className:'section-label' }, 'Message Template'),
    h('textarea', { ref, value, onChange: e => onChange(e.target.value), placeholder:'Type your message. Use chips to insert variables.' }),
    h('div', { className:'chips' }, VARS.map(v => h('button', { key: v, type:'button', className:'chip', onClick: () => insertVar(v) }, v))),
    h('div', { className:'char-count' }, `${value.length} chars`));
}

// ─── PreviewCard ──────────────────────────────────────────────────────────────
function PreviewCard({ prefect, template, date, status, onSendOne }) {
  return h('div', { className:'preview-card' },
    h('div', { className:'preview-card__header' },
      h('div', { className:'preview-card__name' }, prefect.name,
        h('span', { className:`badge badge--${status||'pending'}` }, status === 'opened' ? 'Opened' : 'Pending')),
      h('button', { className:'btn-send-preview', onClick: () => onSendOne(prefect) }, h(WaIcon), 'Send')),
    h('div', { className:'preview-card__msg' }, resolve(template, prefect, date)));
}

// ─── MessagePanel ─────────────────────────────────────────────────────────────
function MessagePanel({ prefects, template, date, sendStatus, showWarn, onTplChange, onDateChange, onSendAll, onSendOne, onReset }) {
  const hasOpened = Object.values(sendStatus).some(s => s === 'opened');
  return h('section', { className:'panel' },
    h('div', { className:'panel__header' },
      h('span', { className:'panel__title' }, 'Message'),
      hasOpened && h('button', { className:'btn-reset', onClick: onReset }, 'Reset Session')),
    h('div', { className:'panel__body' },
      h('div', null,
        h('div', { className:'section-label' }, 'Duty Date'),
        h('input', { type:'date', value: date, onChange: e => onDateChange(e.target.value),
          style:{ border:'1px solid var(--border)', borderRadius:'6px', padding:'.5rem .75rem', fontSize:'.9rem', outline:'none', width:'100%', maxWidth:'220px' } })),
      h(TemplateEditor, { value: template, onChange: onTplChange }),
      h('button', { className:'send-all-btn', onClick: onSendAll, disabled: prefects.length === 0 },
        h(WaIcon), `Send All (${prefects.length})`),
      showWarn && h('div', { className:'popup-warning' },
        'If some tabs didn\'t open, your browser may have blocked them. Use the individual ', h('strong', null, 'Send'), ' buttons below as a fallback.'),
      prefects.length > 0
        ? h('div', { className:'previews-section' },
            h('div', { className:'section-label' }, 'Message Previews'),
            prefects.map(p => h(PreviewCard, { key: p.id, prefect: p, template, date, status: sendStatus[p.id], onSendOne })))
        : h('div', { style:{ textAlign:'center', color:'var(--muted)', fontSize:'.875rem', paddingBottom:'.5rem' } },
            'Add prefects on the left to preview messages here.')));
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [prefects, setPrefects] = useLocalStorage(KEYS.CONTACTS, []);
  const [template, setTemplate] = useLocalStorage(KEYS.TEMPLATE, DEFAULT_TEMPLATE);
  const [date, setDate] = useState(getTomorrow());
  const [sendStatus, setSendStatus] = useState({});
  const [showWarn, setShowWarn] = useState(false);

  const addPrefect = p => setPrefects(prev => [...prev, { ...p, id: crypto.randomUUID() }]);
  const editPrefect = p => setPrefects(prev => prev.map(x => x.id === p.id ? p : x));
  const delPrefect = id => {
    if (!window.confirm('Remove this prefect?')) return;
    setPrefects(prev => prev.filter(p => p.id !== id));
    setSendStatus(prev => { const n = { ...prev }; delete n[id]; return n; });
  };
  const sendOne = p => { window.open(waUrl(p, template, date), '_blank'); setSendStatus(prev => ({ ...prev, [p.id]: 'opened' })); };
  const sendAll = () => {
    setShowWarn(false);
    prefects.forEach(p => window.open(waUrl(p, template, date), '_blank'));
    setSendStatus(prev => ({ ...prev, ...Object.fromEntries(prefects.map(p => [p.id, 'opened'])) }));
    setShowWarn(true);
  };
  const reset = () => { setSendStatus({}); setShowWarn(false); };

  return h('div', null,
    h('header', { className:'app-header' },
      h('div', { className:'wa-icon' }, h(WaIcon)),
      h('h1', null, 'Prefect Messenger')),
    h('main', { className:'app-layout' },
      h(PrefectsPanel, { prefects, sendStatus, onAdd: addPrefect, onEdit: editPrefect, onDelete: delPrefect, onSendOne: sendOne }),
      h(MessagePanel, { prefects, template, date, sendStatus, showWarn, onTplChange: setTemplate, onDateChange: setDate, onSendAll: sendAll, onSendOne: sendOne, onReset: reset })));
}

createRoot(document.getElementById('root')).render(h(StrictMode, null, h(App)));
</script>
</body>
</html>
