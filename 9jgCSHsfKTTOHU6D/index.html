<body class="bg-background text-on-surface min-h-screen pb-24">
<div id="root"></div>
<script type="module">
import { createElement as h, useState, useEffect, useRef, useCallback } from 'https://esm.sh/react@18';
import { createRoot } from 'https://esm.sh/react-dom@18/client';

// ── Firebase loader (lazy) ────────────────────────────────────────────────────
let _FB = null;
async function loadFB() {
  if (_FB) return _FB;
  const [app, auth, fs] = await Promise.all([
    import('https://esm.sh/firebase@10/app'),
    import('https://esm.sh/firebase@10/auth'),
    import('https://esm.sh/firebase@10/firestore'),
  ]);
  _FB = { ...app, ...auth, ...fs };
  return _FB;
}

// ── Constants ─────────────────────────────────────────────────────────────────
const KEYS = { PREFECTS: 'pm_prefects', TEMPLATE: 'pm_template', REMINDERS: 'pm_reminders', HISTORY: 'pm_history', SETTINGS: 'pm_settings' };
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyB-r4lwsxzhfXW8EP5xd9zER0TBl0J5Kvw",
  authDomain: "mathans-prefect.firebaseapp.com",
  projectId: "mathans-prefect",
  storageBucket: "mathans-prefect.firebasestorage.app",
  messagingSenderId: "316422823055",
  appId: "1:316422823055:web:8c8c6d0fefdaa7b3f2a4fa",
  measurementId: "G-JTT2H52JD6"
};
const DEFAULT_SETTINGS = { defaultTime: '07:45 AM – 08:10 AM', defaultDuty: 'Morning Duty', defaultLocation: 'Rear Gate' };
const DEFAULT_TEMPLATE = `Hello {name},\n\nYou are scheduled for duty on *{date}* from *{time}*.\nLocation: {location}\nDuty: {duty}\n\nPlease ensure you are punctual and in full uniform.\n\nThank you.`;
const DEFAULT_REMINDERS = [
  { id: 'r1', title: 'Duty Reminder', icon: 'notifications_active',
    message: `Hello {name}, you are on duty on *{date}* from *{time}*.\nLocation: {location}\nDuty: {duty}\nPlease be punctual and in full uniform. Thank you.` },
  { id: 'r2', title: 'Urgent Notice', icon: 'priority_high',
    message: `⚠️ URGENT: {name}, your duty is on *{date}* at *{time}*.\nLocation: {location} — {duty}\nPlease confirm attendance immediately.` },
  { id: 'r3', title: 'Gentle Nudge', icon: 'history_edu',
    message: `Hi {name}! Quick reminder — duty on *{date}* from *{time}*.\nLocation: {location} ({duty})\nLet me know if you have any questions!` },
];
const VARS = ['{name}', '{date}', '{time}', '{location}', '{duty}'];
const ICONS = ['notifications_active','priority_high','history_edu','schedule','star','flag','bolt','campaign'];

// ── Utils ─────────────────────────────────────────────────────────────────────
const getTomorrow = () => { const d = new Date(); d.setDate(d.getDate()+1); return d.toLocaleDateString('en-CA'); };
const fmtDate = iso => { if (!iso) return ''; const [y,m,day] = iso.split('-'); return new Date(+y,+m-1,+day).toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}); };
const fmtShort = iso => { if (!iso) return ''; const [y,m,day] = iso.split('-'); return new Date(+y,+m-1,+day).toLocaleDateString('en-US',{month:'short',day:'numeric'}); };
const resolveMsg = (tpl,p,date,cfg) => tpl
  .replace(/{name}/g,p.name||'')
  .replace(/{date}/g,fmtDate(date)||date)
  .replace(/{time}/g,p.dutyTime||(cfg?.defaultTime||''))
  .replace(/{location}/g,cfg?.defaultLocation||'')
  .replace(/{duty}/g,p.dutyDescription||(cfg?.defaultDuty||''));
const waUrl = (p,tpl,date,cfg) => `https://wa.me/${p.phone.replace(/\D/g,'')}?text=${encodeURIComponent(resolveMsg(tpl,p,date,cfg))}`;
const getInitials = name => name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
const COLORS = ['bg-emerald-500','bg-blue-500','bg-violet-500','bg-amber-500','bg-pink-500','bg-teal-500','bg-indigo-500','bg-rose-500'];
const avatarBg = str => { let h=0; for(const c of str) h=c.charCodeAt(0)+((h<<5)-h); return COLORS[Math.abs(h)%COLORS.length]; };
const timeAgo = ts => { const d=Date.now()-ts; if(d<60000) return 'Just now'; if(d<3600000) return `${Math.floor(d/60000)}m ago`; if(d<86400000) return `${Math.floor(d/3600000)}h ago`; return `${Math.floor(d/86400000)}d ago`; };
// Quick date parser: "0411" → "2026-04-11", also accepts "YYYY-MM-DD"
const parseQuickDate = str => {
  const s = str.replace(/\D/g,'');
  let iso;
  if (s.length===4) { const y=new Date().getFullYear(); iso=`${y}-${s.slice(0,2)}-${s.slice(2,4)}`; }
  else if (s.length===8) { iso=`${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`; }
  else { iso = str.trim(); } // pass-through for YYYY-MM-DD from date input
  const dt=new Date(iso); return (!iso||isNaN(dt))?null:iso;
};
// Returns the next upcoming duty date for a prefect, or globalDate fallback
const getNextDate = (p,globalDate) => {
  const dates = p.dutyDates||[];
  if (!dates.length) return globalDate;
  const today=new Date().toLocaleDateString('en-CA');
  const upcoming=dates.filter(d=>d>=today).sort();
  return upcoming[0]||[...dates].sort().pop()||globalDate;
};

// ── Hook ──────────────────────────────────────────────────────────────────────
function useLS(key, def) {
  const [v,setV] = useState(()=>{ try{ const s=localStorage.getItem(key); return s?JSON.parse(s):def; }catch{ return def; } });
  useEffect(()=>{ try{ localStorage.setItem(key,JSON.stringify(v)); }catch{} },[key,v]);
  return [v,setV];
}

// ── Primitives ────────────────────────────────────────────────────────────────
const Icon = ({name,filled,cls=''}) => h('span',{className:`material-symbols-outlined ${filled?'filled':''} ${cls}`},name);
const Avatar = ({name,size='md'}) => {
  const sz = size==='lg'?'w-14 h-14 text-base':size==='sm'?'w-9 h-9 text-xs':'w-11 h-11 text-sm';
  return h('div',{className:`${sz} ${avatarBg(name)} rounded-full flex items-center justify-center text-white font-bold shrink-0`},getInitials(name));
};

// ── Modal ─────────────────────────────────────────────────────────────────────
function Modal({title,onClose,children}) {
  return h('div',{className:'fixed inset-0 bg-black/40 flex items-end sm:items-center justify-center z-[60] p-4',onClick:e=>e.target===e.currentTarget&&onClose()},
    h('div',{className:'bg-surface w-full max-w-md rounded-2xl p-6 shadow-2xl max-h-[90vh] overflow-y-auto'},
      h('div',{className:'flex items-center justify-between mb-5'},
        h('h3',{className:'font-bold text-lg'},title),
        h('button',{onClick:onClose,className:'text-on-surface-variant hover:text-on-surface'},h(Icon,{name:'close'}))),
      children));
}

// ── Input / Textarea ──────────────────────────────────────────────────────────
const Inp = (props) => h('input',{...props,className:`w-full border border-outline-variant rounded-xl px-3 py-2.5 text-sm outline-none focus:border-primary bg-surface-container-lowest ${props.className||''}`});
const Field = ({label,hint,warn,children}) => h('div',{className:'mb-4'},
  h('label',{className:'block text-xs font-bold text-on-surface mb-1'},label),
  children,
  warn?h('p',{className:'text-xs text-amber-600 mt-1'},warn):hint?h('p',{className:'text-xs text-on-surface-variant mt-1'},hint):null);

// ── VarChips ──────────────────────────────────────────────────────────────────
function VarChips({taRef,value,onChange}) {
  function insert(v) {
    const el=taRef.current; if(!el) return;
    const s=el.selectionStart,e=el.selectionEnd;
    const next=value.slice(0,s)+v+value.slice(e);
    onChange(next);
    requestAnimationFrame(()=>{ el.focus(); el.selectionStart=el.selectionEnd=s+v.length; });
  }
  return h('div',{className:'flex gap-1.5 flex-wrap mt-2'},
    VARS.map(v=>h('button',{key:v,type:'button',onClick:()=>insert(v),className:'text-xs bg-primary-container/30 text-primary font-mono px-2 py-0.5 rounded-full border border-primary-container/50 hover:bg-primary-container/50'},v)));
}

// ── PrefectForm ───────────────────────────────────────────────────────────────
function PrefectForm({initial,onSave,onCancel}) {
  const [f,setF] = useState(initial??{name:'',phone:'+852',dutyTime:'',dutyDescription:''});
  const set = (k,v) => setF(p=>({...p,[k]:v}));
  const warn = f.phone&&!f.phone.startsWith('+')?'Start with + and country code':null;
  const ok = f.name.trim()&&f.phone.trim();
  return h(Modal,{title:initial?'Edit Prefect':'Add Prefect',onClose:onCancel},
    h('form',{onSubmit:e=>{e.preventDefault();if(ok)onSave({...initial,...f,name:f.name.trim(),phone:f.phone.trim()});}},
      h(Field,{label:'Name *'},h(Inp,{value:f.name,onChange:e=>set('name',e.target.value),placeholder:'e.g. Alice Chan',autoFocus:true})),
      h(Field,{label:'Phone *',hint:'Hong Kong: +852XXXXXXXX',warn},h(Inp,{value:f.phone,onChange:e=>set('phone',e.target.value),placeholder:'+85291234567'})),
      h(Field,{label:'Override Time',hint:'Leave blank to use default from Settings'},h(Inp,{value:f.dutyTime||'',onChange:e=>set('dutyTime',e.target.value),placeholder:'e.g. 09:00 AM – 10:30 AM'})),
      h(Field,{label:'Override Duty',hint:'Leave blank to use default from Settings'},h(Inp,{value:f.dutyDescription||'',onChange:e=>set('dutyDescription',e.target.value),placeholder:'e.g. Library supervision'})),
      h('div',{className:'flex gap-3 mt-2'},
        h('button',{type:'button',onClick:onCancel,className:'flex-1 py-2.5 rounded-xl border border-outline-variant text-on-surface-variant text-sm font-semibold'},'Cancel'),
        h('button',{type:'submit',disabled:!ok,className:'flex-1 py-2.5 rounded-xl bg-primary text-on-primary text-sm font-bold disabled:opacity-40'},initial?'Save':'Add Prefect'))));
}

// ── ReminderForm ──────────────────────────────────────────────────────────────
function ReminderForm({initial,onSave,onCancel}) {
  const [f,setF] = useState(initial??{title:'',icon:'notifications_active',message:DEFAULT_TEMPLATE});
  const set = (k,v) => setF(p=>({...p,[k]:v}));
  const taRef = useRef(null);
  const ok = f.title.trim()&&f.message.trim();
  return h(Modal,{title:initial?'Edit Reminder':'New Special Reminder',onClose:onCancel},
    h('form',{onSubmit:e=>{e.preventDefault();if(ok)onSave({...initial,...f,title:f.title.trim()});}},
      h(Field,{label:'Title *'},h(Inp,{value:f.title,onChange:e=>set('title',e.target.value),placeholder:'e.g. Exam Invigilation',autoFocus:true})),
      h('div',{className:'mb-4'},
        h('label',{className:'block text-xs font-bold text-on-surface mb-2'},'Icon'),
        h('div',{className:'flex gap-2 flex-wrap'},
          ICONS.map(ic=>h('button',{key:ic,type:'button',onClick:()=>set('icon',ic),
            className:`w-10 h-10 rounded-xl flex items-center justify-center transition-colors ${f.icon===ic?'bg-primary text-white':'bg-surface-container text-on-surface-variant hover:bg-surface-container-high'}`},
            h(Icon,{name:ic}))))),
      h('div',{className:'mb-4'},
        h('label',{className:'block text-xs font-bold text-on-surface mb-1'},'Message *'),
        h('textarea',{ref:taRef,value:f.message,onChange:e=>set('message',e.target.value),
          className:'w-full border border-outline-variant rounded-xl px-3 py-2.5 text-sm outline-none focus:border-primary bg-surface-container-lowest resize-none min-h-[110px]'}),
        h(VarChips,{taRef,value:f.message,onChange:v=>set('message',v)})),
      h('div',{className:'flex gap-3 mt-2'},
        h('button',{type:'button',onClick:onCancel,className:'flex-1 py-2.5 rounded-xl border border-outline-variant text-on-surface-variant text-sm font-semibold'},'Cancel'),
        h('button',{type:'submit',disabled:!ok,className:'flex-1 py-2.5 rounded-xl bg-primary text-on-primary text-sm font-bold disabled:opacity-40'},initial?'Save':'Add'))));
}

// ── HOME PAGE ──────────────────────────────────────────────────────────────────
function HomePage({prefects,reminders,activeReminderId,date,sendStatus,history,showWarn,onSendAll,onSendOne,onSelectReminder,onNavigate}) {
  const openedCount = Object.values(sendStatus).filter(s=>s==='opened').length;
  const activeName = activeReminderId ? reminders.find(r=>r.id===activeReminderId)?.title : null;
  const recent = [...history].reverse().slice(0,3);
  const iconCycle = ['history_edu','notifications_active','schedule'];
  const colorCycle = ['text-primary bg-primary-container/30','text-tertiary bg-tertiary-container/30','text-secondary bg-secondary-container/30'];

  return h('div',{className:'space-y-8'},
    // Hero
    h('section',{className:'mt-2'},
      h('div',{className:'relative overflow-hidden rounded-2xl p-8 kinetic-gradient shadow-[0px_12px_32px_rgba(47,46,46,0.12)] flex flex-col gap-4'},
        h('div',{className:'z-10'},
          h('h2',{className:'text-on-primary text-3xl font-black tracking-tight leading-none mb-1'},'Instant Action'),
          h('p',{className:'text-on-primary/80 text-sm font-medium max-w-[220px]'},
            activeName?`Template: ${activeName}`:'Send duty reminders to all prefects at once.'),
          openedCount>0&&h('p',{className:'text-on-primary/70 text-xs mt-1'},`✓ ${openedCount}/${prefects.length} opened`)),
        h('button',{onClick:onSendAll,disabled:prefects.length===0,
          className:'z-10 bg-surface-container-lowest text-primary font-bold px-6 py-3 rounded-xl flex items-center gap-2 active:scale-95 transition-transform disabled:opacity-50 w-fit'},
          h('span',{className:'material-symbols-outlined text-lg'},'send'),
          `Send All (${prefects.length})`),
        h('div',{className:'absolute -right-4 -bottom-4 w-32 h-32 bg-white/10 rounded-full blur-2xl'}),
        h('div',{className:'absolute right-12 top-4 w-16 h-16 bg-primary-container/20 rotate-45 rounded-lg blur-xl'}))),

    // Special Reminders
    h('section',{className:'space-y-3'},
      h('div',{className:'flex items-center justify-between'},
        h('h3',{className:'text-[11px] font-bold tracking-widest uppercase text-on-surface-variant'},'Special Reminders'),
        h('button',{onClick:()=>onNavigate('settings'),className:'text-primary text-xs font-bold'},'Manage')),
      h('div',{className:'flex gap-3 overflow-x-auto pb-2 -mx-2 px-2 scrollbar-hide'},
        reminders.map(r=>{
          const active = activeReminderId===r.id;
          return h('button',{key:r.id,onClick:()=>onSelectReminder(active?null:r.id),
            className:`shrink-0 flex flex-col gap-2 p-4 rounded-xl border-2 transition-all active:scale-95 min-w-[88px] ${active?'bg-primary text-on-primary border-primary':'bg-surface-container-low border-transparent text-on-surface hover:border-outline-variant'}`},
            h(Icon,{name:r.icon,cls:active?'text-white':'text-primary'}),
            h('span',{className:'text-xs font-bold text-left leading-tight'},r.title));
        }),
        h('button',{onClick:()=>onNavigate('settings'),
          className:'shrink-0 flex flex-col items-center justify-center gap-2 p-4 rounded-xl border-2 border-dashed border-outline-variant text-outline min-w-[72px] hover:border-primary hover:text-primary transition-colors'},
          h(Icon,{name:'add'}),
          h('span',{className:'text-xs font-bold'},'New')))),

    // Pinned Prefects
    h('section',{className:'space-y-3'},
      h('div',{className:'flex items-center justify-between'},
        h('h3',{className:'text-[11px] font-bold tracking-widest uppercase text-on-surface-variant'},'Prefects'),
        h('button',{onClick:()=>onNavigate('contacts'),className:'text-primary text-xs font-bold'},'View All')),
      h('div',{className:'flex gap-4 overflow-x-auto pb-2 -mx-2 px-2 scrollbar-hide'},
        prefects.length===0
          ? h('p',{className:'text-sm text-on-surface-variant py-2'},'No prefects yet — tap View All to add some.')
          : prefects.slice(0,8).map(p=>
              h('button',{key:p.id,onClick:()=>onSendOne(p),className:'flex flex-col items-center gap-1.5 shrink-0 active:scale-90 transition-transform'},
                h('div',{className:`w-16 h-16 rounded-full p-1 ${sendStatus[p.id]==='opened'?'bg-primary/20 ring-2 ring-primary':'bg-surface-container-highest'}`},
                  h('div',{className:`w-full h-full rounded-full ${avatarBg(p.name)} flex items-center justify-center text-white text-sm font-bold`},getInitials(p.name))),
                h('span',{className:'text-[10px] font-bold text-on-surface max-w-[60px] truncate text-center'},p.name.split(' ')[0]))),
        h('div',{className:'flex flex-col items-center gap-1.5 shrink-0'},
          h('button',{onClick:()=>onNavigate('contacts'),className:'w-16 h-16 rounded-full border-2 border-dashed border-outline-variant flex items-center justify-center text-outline hover:border-primary hover:text-primary transition-colors'},
            h(Icon,{name:'add'})),
          h('span',{className:'text-[10px] font-bold text-on-surface'},'New')))),

    showWarn&&h('div',{className:'bg-amber-50 border border-amber-200 rounded-xl p-4 text-xs text-amber-800'},
      '⚠️ If some tabs were blocked, use individual Send buttons on the Contacts page as a fallback.'),

    // Recent Activity
    recent.length>0&&h('section',{className:'space-y-4'},
      h('div',{className:'flex items-center justify-between'},
        h('h3',{className:'text-[11px] font-bold tracking-widest uppercase text-on-surface-variant'},'Recent Reminders'),
        h('button',{onClick:()=>onNavigate('history'),className:'text-primary text-xs font-bold'},'View All')),
      h('div',{className:'grid gap-3'},
        recent.map((item,i)=>h('div',{key:item.id,className:'group bg-surface-container-low rounded-xl p-4 flex items-center justify-between gap-4 hover:bg-surface-container transition-all'},
          h('div',{className:'flex items-center gap-3'},
            h('div',{className:`w-11 h-11 rounded-xl ${colorCycle[i%3]} flex items-center justify-center`},h(Icon,{name:iconCycle[i%3]})),
            h('div',null,
              h('h4',{className:'font-bold text-on-surface text-sm'},item.prefectName),
              h('p',{className:'text-on-surface-variant text-xs line-clamp-1'},`"${item.message.slice(0,50)}..."`),
              h('span',{className:`text-[10px] font-medium mt-0.5 block ${i===0?'text-primary':'text-on-surface-variant'}`},timeAgo(item.timestamp)))),
          h('button',{onClick:()=>{ const p=prefects.find(x=>x.id===item.prefectId); if(p)onSendOne(p); },
            className:'w-9 h-9 rounded-full bg-surface-container-lowest shadow-sm flex items-center justify-center text-primary group-active:scale-90 transition-transform'},
            h(Icon,{name:'refresh'})))))),

    // Stats
    h('section',{className:'grid grid-cols-2 gap-4 pb-6'},
      h('div',{className:'bg-surface-container-highest rounded-xl p-5 flex flex-col justify-between aspect-square'},
        h('span',{className:'material-symbols-outlined text-primary text-3xl'},'auto_awesome'),
        h('div',null,
          h('div',{className:'text-2xl font-black text-on-surface'},history.length),
          h('div',{className:'text-[10px] font-bold uppercase tracking-wider text-on-surface-variant'},'Total Sent'))),
      h('div',{className:'bg-surface-container-lowest border border-outline-variant/10 rounded-xl p-5 flex flex-col justify-between aspect-square'},
        h('span',{className:'material-symbols-outlined text-tertiary text-3xl'},'group'),
        h('div',null,
          h('div',{className:'text-2xl font-black text-on-surface'},prefects.length),
          h('div',{className:'text-[10px] font-bold uppercase tracking-wider text-on-surface-variant'},'Prefects')))));
}

// ── DateInput — quick add for a prefect's duty dates ─────────────────────────
function DateInput({dutyDates,onAddDate,onRemoveDate}) {
  const [raw,setRaw] = useState('');
  const inputRef = useRef(null);
  function commit(val) {
    const iso = parseQuickDate(val);
    if (!iso) return;
    if (dutyDates.includes(iso)) { setRaw(''); return; }
    onAddDate(iso);
    setRaw('');
    inputRef.current?.focus();
  }
  function onKey(e) {
    if (e.key==='Enter') { e.preventDefault(); commit(raw); }
  }
  const sorted = [...dutyDates].sort();
  const today = new Date().toLocaleDateString('en-CA');
  return h('div',{className:'flex flex-col gap-2 pt-2 border-t border-outline-variant/30'},
    h('div',{className:'flex items-center gap-1.5'},
      h(Icon,{name:'calendar_month',cls:'text-xs text-on-surface-variant shrink-0'}),
      h('span',{className:'text-xs font-bold text-on-surface-variant shrink-0'},'Duty Dates'),
      sorted.length===0&&h('span',{className:'text-[10px] italic text-on-surface-variant/60'},'— none scheduled')),
    sorted.length>0&&h('div',{className:'flex flex-wrap gap-1.5'},
      sorted.map(d=>h('span',{key:d,className:`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-bold ${d<today?'bg-surface-container-highest text-on-surface-variant':'bg-primary-container/40 text-primary'}`},
        fmtShort(d),
        h('button',{type:'button',onClick:()=>onRemoveDate(d),className:'hover:text-red-500 leading-none ml-0.5'},
          h(Icon,{name:'close',cls:'text-[10px] leading-none'}))))),
    h('div',{className:'flex gap-2'},
      h('input',{ref:inputRef,value:raw,onChange:e=>setRaw(e.target.value),onKeyDown:onKey,
        placeholder:'Type 0411 or pick →',
        className:'flex-1 border border-outline-variant rounded-lg px-2.5 py-1.5 text-xs outline-none focus:border-primary bg-surface-container-lowest'}),
      h('input',{type:'date',onChange:e=>{ if(e.target.value){ onAddDate(e.target.value); e.target.value=''; } },
        className:'border border-outline-variant rounded-lg px-2 py-1.5 text-xs outline-none focus:border-primary bg-surface-container-lowest w-[38px] cursor-pointer',
        title:'Pick from calendar'}),
      h('button',{type:'button',onClick:()=>commit(raw),disabled:!raw.trim(),
        className:'px-3 py-1.5 rounded-lg bg-primary text-white text-xs font-bold disabled:opacity-30 active:scale-95 transition-transform'},
        h(Icon,{name:'add',cls:'text-sm'}))));
}

// ── CONTACTS PAGE ──────────────────────────────────────────────────────────────
function ContactsPage({prefects,sendStatus,onAdd,onEdit,onDelete,onSendOne,onUpdateDates}) {
  const [showForm,setShowForm] = useState(false);
  const [editTarget,setEditTarget] = useState(null);
  function addDate(id,iso) {
    const p=prefects.find(x=>x.id===id);
    if(!p)return;
    const dates=[...(p.dutyDates||[])];
    if(!dates.includes(iso))dates.push(iso);
    onUpdateDates(id,dates);
  }
  function removeDate(id,iso) {
    const p=prefects.find(x=>x.id===id);
    if(!p)return;
    onUpdateDates(id,(p.dutyDates||[]).filter(d=>d!==iso));
  }
  return h('div',{className:'space-y-4'},
    h('div',{className:'flex items-center justify-between mb-2'},
      h('div',null,
        h('h2',{className:'font-black text-xl'},'Prefects'),
        h('p',{className:'text-xs text-on-surface-variant mt-0.5'},`${prefects.length} contact${prefects.length!==1?'s':''}`)),
      h('button',{onClick:()=>setShowForm(true),className:'bg-primary text-on-primary font-bold px-4 py-2 rounded-xl flex items-center gap-1.5 text-sm active:scale-95 transition-transform'},
        h(Icon,{name:'add'}),'Add')),
    prefects.length===0
      ?h('div',{className:'text-center py-16 text-on-surface-variant'},
          h('div',{className:'text-5xl mb-3'},'👤'),
          h('p',{className:'font-bold mb-1'},'No prefects yet'),
          h('p',{className:'text-sm'},'Tap Add to get started'))
      :prefects.map(p=>h('div',{key:p.id,className:'bg-surface-container-low rounded-xl p-4 flex flex-col gap-3 hover:bg-surface-container transition-all'},
          h('div',{className:'flex items-center gap-3'},
            h(Avatar,{name:p.name}),
            h('div',{className:'flex-1 min-w-0'},
              h('div',{className:'flex items-center gap-2'},
                h('p',{className:'font-bold text-sm'},p.name),
                sendStatus[p.id]==='opened'&&h('span',{className:'text-[9px] font-bold bg-green-100 text-green-700 px-1.5 py-0.5 rounded-full uppercase'},'Sent')),
              h('p',{className:'text-xs text-on-surface-variant'},p.phone),
              (p.dutyTime||p.dutyDescription)&&h('p',{className:'text-xs text-on-surface-variant mt-0.5 truncate'},[p.dutyTime,p.dutyDescription].filter(Boolean).join(' · '))),
            h('div',{className:'flex items-center gap-1.5'},
              h('button',{onClick:()=>onSendOne(p),className:'px-3 py-1.5 rounded-lg border border-primary text-primary text-xs font-bold hover:bg-primary hover:text-white transition-colors'},'Send'),
              h('button',{onClick:()=>setEditTarget(p),className:'w-8 h-8 rounded-lg flex items-center justify-center text-on-surface-variant hover:bg-surface-container-highest'},h(Icon,{name:'edit',cls:'text-base'})),
              h('button',{onClick:()=>{ if(window.confirm('Remove this prefect?'))onDelete(p.id); },className:'w-8 h-8 rounded-lg flex items-center justify-center text-on-surface-variant hover:text-red-500 hover:bg-red-50'},h(Icon,{name:'delete',cls:'text-base'})))),
          h(DateInput,{dutyDates:p.dutyDates||[],onAddDate:iso=>addDate(p.id,iso),onRemoveDate:iso=>removeDate(p.id,iso)}))),
    showForm&&h(PrefectForm,{onSave:d=>{onAdd(d);setShowForm(false);},onCancel:()=>setShowForm(false)}),
    editTarget&&h(PrefectForm,{initial:editTarget,onSave:d=>{onEdit(d);setEditTarget(null);},onCancel:()=>setEditTarget(null)}));
}

// ── HISTORY PAGE ──────────────────────────────────────────────────────────────
function HistoryPage({history,prefects,onResend}) {
  if(history.length===0) return h('div',{className:'text-center py-16 text-on-surface-variant'},
    h('div',{className:'text-5xl mb-3'},'📭'),
    h('p',{className:'font-bold mb-1'},'No history yet'),
    h('p',{className:'text-sm'},'Messages you send will appear here'));
  return h('div',{className:'space-y-4'},
    h('div',{className:'mb-2'},
      h('h2',{className:'font-black text-xl'},'History'),
      h('p',{className:'text-xs text-on-surface-variant mt-0.5'},`${history.length} messages sent`)),
    [...history].reverse().map(item=>h('div',{key:item.id,className:'group bg-surface-container-low rounded-xl p-4 flex items-start gap-3 hover:bg-surface-container transition-all'},
      h('div',{className:'w-10 h-10 rounded-xl bg-primary-container/30 flex items-center justify-center text-primary shrink-0 mt-0.5'},h(Icon,{name:'history_edu'})),
      h('div',{className:'flex-1 min-w-0'},
        h('p',{className:'font-bold text-sm'},item.prefectName),
        h('p',{className:'text-xs text-on-surface-variant mt-0.5 line-clamp-2'},item.message),
        h('span',{className:'text-[10px] text-on-surface-variant mt-1 block'},timeAgo(item.timestamp))),
      h('button',{onClick:()=>{ const p=prefects.find(x=>x.id===item.prefectId); if(p)onResend(p); },
        className:'w-9 h-9 rounded-full bg-surface-container-lowest shadow-sm flex items-center justify-center text-primary shrink-0 group-active:scale-90 transition-transform'},
        h(Icon,{name:'refresh'})))));
}

// ── CloudSync panel ───────────────────────────────────────────────────────────
function CloudSync({user,syncStatus}) {
  const dot = syncStatus==='synced'?'bg-green-500':syncStatus==='syncing'?'bg-amber-400 animate-pulse':syncStatus==='error'?'bg-red-500':'bg-stone-300 animate-pulse';
  const label = syncStatus==='synced'?'Synced':syncStatus==='syncing'?'Syncing…':syncStatus==='error'?'Sync error':'Connecting…';
  return h('div',{className:'bg-surface-container-low rounded-xl p-5'},
    h('div',{className:'flex items-center justify-between'},
      h('div',{className:'flex items-center gap-2'},
        h(Icon,{name:syncStatus==='synced'?'cloud_done':'cloud_sync',cls:'text-primary'}),
        h('h3',{className:'font-bold text-sm'},'Cloud Sync')),
      h('div',{className:'flex items-center gap-1.5'},
        h('span',{className:`w-2 h-2 rounded-full ${dot}`}),
        h('span',{className:'text-xs font-bold text-on-surface-variant'},label))),
    user&&h('p',{className:'text-[10px] text-on-surface-variant font-mono mt-2 break-all'},`UID: ${user.uid}`));
}

// ── SETTINGS PAGE ──────────────────────────────────────────────────────────────
function SettingsPage({template,selectedDate,reminders,settings,user,syncStatus,onTemplateChange,onDateChange,onRemindersChange,onSettingsChange}) {
  const [editR,setEditR] = useState(null);
  const [showRForm,setShowRForm] = useState(false);
  const taRef = useRef(null);
  function saveR(data) {
    if(data.id) onRemindersChange(reminders.map(r=>r.id===data.id?data:r));
    else onRemindersChange([...reminders,{...data,id:crypto.randomUUID()}]);
    setEditR(null); setShowRForm(false);
  }
  const setSetting = (k,v) => onSettingsChange({...settings,[k]:v});
  return h('div',{className:'space-y-6'},
    h('h2',{className:'font-black text-xl'},'Settings'),

    // Cloud Sync
    h(CloudSync,{user,syncStatus}),

    // Default Duty Settings
    h('div',{className:'bg-surface-container-low rounded-xl p-5 space-y-4'},
      h('div',{className:'flex items-center gap-2'},h(Icon,{name:'tune',cls:'text-primary'}),h('h3',{className:'font-bold text-sm'},'Default Duty Settings')),
      h(Field,{label:'Default Time',hint:'Used in messages when no per-prefect override is set'},
        h(Inp,{value:settings.defaultTime,onChange:e=>setSetting('defaultTime',e.target.value),placeholder:'e.g. 07:45 AM – 08:10 AM'})),
      h(Field,{label:'Default Location'},
        h(Inp,{value:settings.defaultLocation,onChange:e=>setSetting('defaultLocation',e.target.value),placeholder:'e.g. Rear Gate'})),
      h(Field,{label:'Default Duty'},
        h(Inp,{value:settings.defaultDuty,onChange:e=>setSetting('defaultDuty',e.target.value),placeholder:'e.g. Morning Duty'}))),

    // Fallback Global Date
    h('div',{className:'bg-surface-container-low rounded-xl p-5'},
      h('div',{className:'flex items-center gap-2 mb-3'},h(Icon,{name:'calendar_month',cls:'text-primary'}),h('h3',{className:'font-bold text-sm'},'Fallback Global Date'),
        h('span',{className:'text-xs text-on-surface-variant ml-1'},'— used when a prefect has no dates scheduled')),
      h('input',{type:'date',value:selectedDate,onChange:e=>onDateChange(e.target.value),
        className:'border border-outline-variant rounded-xl px-3 py-2 text-sm outline-none focus:border-primary bg-surface-container-lowest'})),

    // Default template
    h('div',{className:'bg-surface-container-low rounded-xl p-5'},
      h('div',{className:'flex items-center gap-2 mb-3'},h(Icon,{name:'edit_note',cls:'text-primary'}),h('h3',{className:'font-bold text-sm'},'Default Message Template')),
      h('textarea',{ref:taRef,value:template,onChange:e=>onTemplateChange(e.target.value),
        className:'w-full border border-outline-variant rounded-xl px-3 py-2.5 text-sm outline-none focus:border-primary bg-surface-container-lowest resize-none min-h-[130px]'}),
      h(VarChips,{taRef,value:template,onChange:onTemplateChange}),
      h('p',{className:'text-xs text-on-surface-variant mt-1.5 text-right'},`${template.length} chars`)),

    // Special Reminders manager
    h('div',{className:'space-y-3'},
      h('div',{className:'flex items-center justify-between'},
        h('div',{className:'flex items-center gap-2'},
          h(Icon,{name:'auto_awesome',cls:'text-primary'}),
          h('h3',{className:'font-bold text-sm'},'Special Reminders')),
        h('button',{onClick:()=>setShowRForm(true),className:'bg-primary text-on-primary text-xs font-bold px-3 py-1.5 rounded-xl flex items-center gap-1 active:scale-95 transition-transform'},
          h(Icon,{name:'add',cls:'text-base'}),'New')),
      reminders.length===0&&h('p',{className:'text-sm text-on-surface-variant text-center py-4'},'No special reminders yet. Tap New to add one.'),
      reminders.map(r=>h('div',{key:r.id,className:'bg-surface-container-low rounded-xl p-4 flex items-start gap-3'},
        h('div',{className:'w-10 h-10 rounded-xl bg-primary-container/30 flex items-center justify-center text-primary shrink-0'},h(Icon,{name:r.icon})),
        h('div',{className:'flex-1 min-w-0'},
          h('p',{className:'font-bold text-sm'},r.title),
          h('p',{className:'text-xs text-on-surface-variant mt-0.5 line-clamp-2'},r.message)),
        h('div',{className:'flex gap-1 shrink-0'},
          h('button',{onClick:()=>setEditR(r),className:'w-8 h-8 rounded-lg flex items-center justify-center text-on-surface-variant hover:bg-surface-container-highest'},h(Icon,{name:'edit',cls:'text-base'})),
          h('button',{onClick:()=>{ if(window.confirm('Remove this reminder?'))onRemindersChange(reminders.filter(x=>x.id!==r.id)); },className:'w-8 h-8 rounded-lg flex items-center justify-center text-on-surface-variant hover:text-red-500 hover:bg-red-50'},h(Icon,{name:'delete',cls:'text-base'})))))),

    showRForm&&h(ReminderForm,{onSave:saveR,onCancel:()=>setShowRForm(false)}),
    editR&&h(ReminderForm,{initial:editR,onSave:saveR,onCancel:()=>setEditR(null)}));
}

// ── APP ────────────────────────────────────────────────────────────────────────
function App() {
  const [prefects,setPrefects] = useLS(KEYS.PREFECTS,[]);
  const [template,setTemplate] = useLS(KEYS.TEMPLATE,DEFAULT_TEMPLATE);
  const [reminders,setReminders] = useLS(KEYS.REMINDERS,DEFAULT_REMINDERS);
  const [historyLog,setHistoryLog] = useLS(KEYS.HISTORY,[]);
  const [settings,setSettings] = useLS(KEYS.SETTINGS,DEFAULT_SETTINGS);
  const [date,setDate] = useState(getTomorrow());
  const [sendStatus,setSendStatus] = useState({});
  const [showWarn,setShowWarn] = useState(false);
  const [page,setPage] = useState('home');
  const [activeReminderId,setActiveReminderId] = useState(null);
  // Cloud sync state
  const [user,setUser] = useState(null);
  const [syncStatus,setSyncStatus] = useState('local'); // local|connecting|syncing|synced|error
  const fbRef = useRef(null); // { fb, auth, db }
  const loadingCloud = useRef(false);
  const syncTimer = useRef(null);

  // migrate old single-date prefects to dutyDates array
  useEffect(()=>{
    const needsMigration = prefects.some(p=>p.dutyDate!==undefined&&!p.dutyDates);
    if(needsMigration) setPrefects(prev=>prev.map(p=>{
      if(p.dutyDate!==undefined&&!p.dutyDates){
        const {dutyDate,...rest}=p;
        return {...rest,dutyDates:dutyDate?[dutyDate]:[]};
      }
      return p;
    }));
  },[]);

  // Auto-init Firebase on mount
  useEffect(()=>{
    setSyncStatus('connecting');
    loadFB().then(fb=>{
      const app = fb.getApps().length ? fb.getApp() : fb.initializeApp(FIREBASE_CONFIG);
      const auth = fb.getAuth(app);
      const db = fb.getFirestore(app);
      fbRef.current = { fb, auth, db };
      fb.onAuthStateChanged(auth, u=>{
        if(u){ setUser(u); }
        else { fb.signInAnonymously(auth).catch(()=>setSyncStatus('error')); }
      });
    }).catch(()=>setSyncStatus('error'));
  },[]);

  // Load data from Firestore when user signs in
  useEffect(()=>{
    if(!user||!fbRef.current) return;
    const {fb,db}=fbRef.current;
    loadingCloud.current=true;
    setSyncStatus('syncing');
    fb.getDoc(fb.doc(db,'pm',user.uid)).then(snap=>{
      if(snap.exists()){
        const d=snap.data();
        if(d.prefects!==undefined) setPrefects(d.prefects);
        if(d.template!==undefined) setTemplate(d.template);
        if(d.reminders!==undefined) setReminders(d.reminders);
        if(d.historyLog!==undefined) setHistoryLog(d.historyLog);
        if(d.settings!==undefined) setSettings(d.settings);
      }
      setSyncStatus('synced');
      setTimeout(()=>{ loadingCloud.current=false; },300);
    }).catch(()=>{ setSyncStatus('error'); loadingCloud.current=false; });
  },[user]);

  // Debounced save to Firestore on any data change
  useEffect(()=>{
    if(!user||!fbRef.current||loadingCloud.current) return;
    clearTimeout(syncTimer.current);
    setSyncStatus('syncing');
    syncTimer.current=setTimeout(async()=>{
      try{
        const {fb,db}=fbRef.current;
        await fb.setDoc(fb.doc(db,'pm',user.uid),{prefects,template,reminders,historyLog,settings},{merge:true});
        setSyncStatus('synced');
      }catch(e){ setSyncStatus('error'); }
    },1500);
  },[prefects,template,reminders,historyLog,settings]);


  const activeTpl = () => activeReminderId ? (reminders.find(r=>r.id===activeReminderId)?.message||template) : template;
  const cfg = settings;

  function sendOne(p) {
    const d = getNextDate(p, date);
    window.open(waUrl(p,activeTpl(),d,cfg),'_blank');
    setSendStatus(prev=>({...prev,[p.id]:'opened'}));
    const msg = resolveMsg(activeTpl(),p,d,cfg);
    setHistoryLog(prev=>[...prev,{id:crypto.randomUUID(),prefectId:p.id,prefectName:p.name,message:msg,timestamp:Date.now()}]);
  }

  function sendAll() {
    setShowWarn(false);
    const tpl = activeTpl();
    prefects.forEach(p=>window.open(waUrl(p,tpl,getNextDate(p,date),cfg),'_blank'));
    setSendStatus(prev=>({...prev,...Object.fromEntries(prefects.map(p=>[p.id,'opened']))}));
    const entries = prefects.map(p=>({id:crypto.randomUUID(),prefectId:p.id,prefectName:p.name,message:resolveMsg(tpl,p,getNextDate(p,date),cfg),timestamp:Date.now()}));
    setHistoryLog(prev=>[...prev,...entries]);
    setShowWarn(true);
  }

  function updatePrefectDates(id, dutyDates) {
    setPrefects(prev=>prev.map(p=>p.id===id?{...p,dutyDates}:p));
  }

  const NAV = [{id:'home',icon:'home',label:'Home'},{id:'contacts',icon:'contacts',label:'Contacts'},{id:'history',icon:'history',label:'History'},{id:'settings',icon:'settings',label:'Settings'}];

  return h('div',null,
    h('header',{className:'fixed top-0 w-full z-50 bg-stone-50/80 backdrop-blur-xl flex items-center justify-between px-6 h-16'},
      h('div',{className:'flex items-center gap-3'},
        h('div',{className:'w-8 h-8 rounded-full bg-primary flex items-center justify-center'},
          h('span',{className:'material-symbols-outlined text-white text-base'},'notifications_active')),
        h('h1',{className:'font-black tracking-tighter text-primary'},'Prefect Messenger')),
      h('div',{className:'flex items-center gap-2'},
        user&&h('span',{className:`text-[10px] font-bold flex items-center gap-1 ${syncStatus==='synced'?'text-green-600':syncStatus==='syncing'?'text-amber-500':syncStatus==='error'?'text-red-500':'text-stone-400'}`},
          h('span',{className:`w-1.5 h-1.5 rounded-full inline-block ${syncStatus==='synced'?'bg-green-500':syncStatus==='syncing'?'bg-amber-400 animate-pulse':'bg-red-400'}`}),
          syncStatus==='synced'?'Synced':syncStatus==='syncing'?'Syncing':'Error'),
        Object.values(sendStatus).some(s=>s==='opened')&&
          h('button',{onClick:()=>{setSendStatus({});setShowWarn(false);},className:'text-xs text-on-surface-variant border border-outline-variant rounded-lg px-2.5 py-1 hover:bg-surface-container'},'Reset'))),

    h('main',{className:'pt-20 px-5 max-w-2xl mx-auto'},
      page==='home'&&h(HomePage,{prefects,reminders,activeReminderId,date,sendStatus,history:historyLog,showWarn,onSendAll:sendAll,onSendOne:sendOne,onSelectReminder:setActiveReminderId,onNavigate:setPage}),
      page==='contacts'&&h(ContactsPage,{prefects,sendStatus,
        onAdd:p=>setPrefects(prev=>[...prev,{...p,dutyDates:p.dutyDates||[],id:crypto.randomUUID()}]),
        onEdit:p=>setPrefects(prev=>prev.map(x=>x.id===p.id?p:x)),
        onDelete:id=>{setPrefects(prev=>prev.filter(p=>p.id!==id));setSendStatus(prev=>{const n={...prev};delete n[id];return n;});},
        onSendOne:sendOne,onUpdateDates:updatePrefectDates}),
      page==='history'&&h(HistoryPage,{history:historyLog,prefects,onResend:sendOne}),
      page==='settings'&&h(SettingsPage,{template,selectedDate:date,reminders,settings,user,syncStatus,onTemplateChange:setTemplate,onDateChange:setDate,onRemindersChange:setReminders,onSettingsChange:setSettings})),

    h('nav',{className:'fixed bottom-0 left-0 w-full h-20 bg-stone-50/80 backdrop-blur-xl flex justify-around items-center px-4 pb-4 z-50 rounded-t-3xl shadow-[0px_-12px_32px_rgba(47,46,46,0.06)]'},
      NAV.map(({id,icon,label})=>h('a',{key:id,onClick:e=>{e.preventDefault();setPage(id);},href:'#',
        className:`flex flex-col items-center justify-center px-5 py-2 rounded-2xl active:scale-90 duration-300 ease-out transition-all ${page===id?'bg-green-100 text-green-700':'text-stone-500 hover:bg-stone-200/50'}`},
        h('span',{className:'material-symbols-outlined',style:page===id?{fontVariationSettings:"'FILL' 1"}:undefined},icon),
        h('span',{className:'font-inter text-[11px] font-bold tracking-wide uppercase mt-1'},label)))));
}

createRoot(document.getElementById('root')).render(h(App));
</script>
