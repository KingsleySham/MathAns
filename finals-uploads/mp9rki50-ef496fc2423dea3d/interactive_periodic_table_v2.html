const SHELL_CAPACITY = [2, 8, 18, 32, 32, 18, 8];
const SHELL_NAMES = ['K (1)','L (2)','M (3)','N (4)','O (5)','P (6)','Q (7)'];

function getElectronArrangement(z) {
  const shells = [0,0,0,0,0,0,0];
  const cap = SHELL_CAPACITY;
  let remaining = z;
  for(let i=0;i<7;i++){
    const fill = Math.min(remaining, cap[i]);
    shells[i] = fill;
    remaining -= fill;
    if(remaining <= 0) break;
  }
  return shells.filter((_,i) => z > [0,2,10,28,60,92,110][i]).length > 0
    ? shells : shells;
}

function computeShells(z) {
  const cap = SHELL_CAPACITY;
  const result = [];
  let rem = z;
  for(let i=0;i<7;i++){
    if(rem <= 0) break;
    const fill = Math.min(rem, cap[i]);
    result.push(fill);
    rem -= fill;
  }
  return result;
}

function drawBohr(canvas, shells, color) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  const cx = W/2, cy = H/2;
  const nShells = shells.length;
  const maxR = Math.min(cx,cy) - 10;
  const minR = 10;
  const step = nShells > 1 ? (maxR - minR)/(nShells-1) : 0;

  const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  const orbitColor = isDark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.12)';
  const nucleusColor = color;
  const electronColor = color;

  shells.forEach((count, i) => {
    const r = nShells === 1 ? maxR * 0.5 : minR + i * step;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.strokeStyle = orbitColor;
    ctx.lineWidth = 0.8;
    ctx.stroke();

    for(let e=0; e<count; e++) {
      const angle = (2*Math.PI/count)*e - Math.PI/2;
      const ex = cx + r * Math.cos(angle);
      const ey = cy + r * Math.sin(angle);
      ctx.beginPath();
      ctx.arc(ex, ey, 3.5, 0, Math.PI*2);
      ctx.fillStyle = electronColor;
      ctx.fill();
    }
  });

  const nuclR = Math.max(6, 3 + shells.reduce((a,b)=>a+b,0)*0.08);
  ctx.beginPath();
  ctx.arc(cx, cy, Math.min(nuclR,12), 0, Math.PI*2);
  ctx.fillStyle = nucleusColor;
  ctx.fill();
}

function computeShells(z) {
  const cap = [2,8,18,32,32,18,8];
  const result = [];
  let rem = z;
  for(let i=0;i<7;i++){
    if(rem<=0) break;
    result.push(Math.min(rem,cap[i]));
    rem -= cap[i];
  }
  return result;
}

function getStyle(el) {
  const c = CATS[el.cat]||{bg:"#ccc",fg:"#333"};
  return `background:${c.bg};color:${c.fg};`;
}

function buildLegend() {
  const lg = document.getElementById('legend');
  Object.entries(CATS).forEach(([k,v])=>{
    const d=document.createElement('div');
    d.className='leg';
    d.innerHTML=`<div class="leg-dot" style="background:${v.bg};border:0.5px solid rgba(0,0,0,0.12)"></div><span>${v.label}</span>`;
    lg.appendChild(d);
  });
}

const GRID_MAP = {};
ELS.forEach(el=>{
  if(el.period<=7&&el.group) GRID_MAP[`${el.period}-${el.group}`]=el;
});
const LANTHANIDES=ELS.filter(e=>e.cat==='lanthanide'&&!e.group);
const ACTINIDES=ELS.filter(e=>e.cat==='actinide'&&!e.group);

function buildGrid() {
  const grid=document.getElementById('grid');
  for(let p=1;p<=7;p++){
    for(let g=1;g<=18;g++){
      const el=GRID_MAP[`${p}-${g}`];
      const div=document.createElement('div');
      if(el){
        div.className='cell';
        div.style.cssText=getStyle(el);
        div.innerHTML=`<span class="num">${el.z}</span><span class="sym">${el.sym}</span><span class="name-s">${el.name}</span>`;
        div.dataset.z=el.z;
        div.addEventListener('click',()=>showPanel(el));
      } else {
        if(p===6&&g===3){div.className='spacer';div.style.cssText='font-size:8px;color:var(--color-text-tertiary);display:flex;align-items:center;justify-content:center;';div.textContent='57–71';}
        else if(p===7&&g===3){div.className='spacer';div.style.cssText='font-size:8px;color:var(--color-text-tertiary);display:flex;align-items:center;justify-content:center;';div.textContent='89–103';}
        else div.className='spacer';
      }
      grid.appendChild(div);
    }
  }
  const gap=document.createElement('div');
  gap.style.cssText='grid-column:1/-1;height:6px;';
  grid.appendChild(gap);

  const lanLabel=document.createElement('div');
  lanLabel.style.cssText='grid-column:1/4;display:flex;align-items:center;justify-content:flex-end;padding-right:4px;font-size:8px;color:var(--color-text-tertiary);';
  lanLabel.textContent='57–71';
  const lanRow=document.createElement('div');
  lanRow.style.cssText='grid-column:4/19;display:grid;grid-template-columns:repeat(15,1fr);gap:2px;';
  LANTHANIDES.forEach(el=>{
    const div=document.createElement('div');
    div.className='cell';div.style.cssText=getStyle(el);
    div.innerHTML=`<span class="num">${el.z}</span><span class="sym">${el.sym}</span><span class="name-s">${el.name}</span>`;
    div.dataset.z=el.z;div.addEventListener('click',()=>showPanel(el));
    lanRow.appendChild(div);
  });
  grid.appendChild(lanLabel);grid.appendChild(lanRow);

  const actLabel=document.createElement('div');
  actLabel.style.cssText='grid-column:1/4;display:flex;align-items:center;justify-content:flex-end;padding-right:4px;font-size:8px;color:var(--color-text-tertiary);';
  actLabel.textContent='89–103';
  const actRow=document.createElement('div');
  actRow.style.cssText='grid-column:4/19;display:grid;grid-template-columns:repeat(15,1fr);gap:2px;';
  ACTINIDES.forEach(el=>{
    const div=document.createElement('div');
    div.className='cell';div.style.cssText=getStyle(el);
    div.innerHTML=`<span class="num">${el.z}</span><span class="sym">${el.sym}</span><span class="name-s">${el.name}</span>`;
    div.dataset.z=el.z;div.addEventListener('click',()=>showPanel(el));
    actRow.appendChild(div);
  });
  grid.appendChild(actLabel);grid.appendChild(actRow);
}

function drawBohr(shells, color) {
  const canvas=document.getElementById('bohr-canvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2;
  ctx.clearRect(0,0,W,H);
  const n=shells.length;
  const maxR=Math.min(cx,cy)-8;
  const minR=n>1?10:maxR*0.5;
  const step=n>1?(maxR-minR)/(n-1):0;
  const isDark=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches;
  const orbitC=isDark?'rgba(255,255,255,0.13)':'rgba(0,0,0,0.1)';

  shells.forEach((count,i)=>{
    const r=n===1?maxR*0.5:minR+i*step;
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle=orbitC;ctx.lineWidth=0.8;ctx.stroke();
    for(let e=0;e<count;e++){
      const angle=(2*Math.PI/count)*e-Math.PI/2;
      ctx.beginPath();ctx.arc(cx+r*Math.cos(angle),cy+r*Math.sin(angle),3.2,0,Math.PI*2);
      ctx.fillStyle=color;ctx.fill();
    }
  });
  const nr=Math.min(10+shells.reduce((a,b)=>a+b,0)*0.07,14);
  ctx.beginPath();ctx.arc(cx,cy,nr,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
}

function showPanel(el) {
  const c=CATS[el.cat]||{bg:'#ccc',fg:'#333'};
  const badge=document.getElementById('el-badge');
  badge.style.cssText=`background:${c.bg};color:${c.fg};width:72px;height:72px;border-radius:var(--border-radius-md);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;`;
  badge.innerHTML=`<span class="b-num">${el.z}</span><span class="b-sym">${el.sym}</span><span class="b-mass">${el.mass}</span>`;
  document.getElementById('el-name').textContent=el.name;
  const tag=document.getElementById('el-cat-tag');
  tag.textContent=CATS[el.cat]?.label||el.cat;
  tag.style.cssText=`display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;margin-bottom:8px;background:${c.bg};color:${c.fg};`;
  const props=[
    ['Atomic number',el.z],['Atomic mass',el.mass+' u'],
    ['State (STP)',el.state],['Electronegativity',el.en??'—'],
    ['Melting point',el.mp!=null?el.mp+'°C':'—'],['Boiling point',el.bp!=null?el.bp+'°C':'—'],
    ['Electron config.',el.config],['Group / Period',(el.group||'—')+' / '+el.period],
  ];
  document.getElementById('el-props').innerHTML=props.map(([l,v])=>`<div class="info-row"><span class="info-label">${l}</span><span class="info-val">${v}</span></div>`).join('');
  document.getElementById('el-desc').textContent=el.desc;

  const shells=computeShells(el.z);
  const shellNames=['K','L','M','N','O','P','Q'];
  const shellMax=[2,8,18,32,32,18,8];

  drawBohr(shells,c.fg==='#fff'||c.fg.startsWith('#0')||c.fg.startsWith('#1')||c.fg.startsWith('#04')||c.fg.startsWith('#17')||c.fg.startsWith('#26')||c.fg.startsWith('#4A')||c.fg.startsWith('#41')||c.fg.startsWith('#4B')||c.fg.startsWith('#63')||c.fg.startsWith('#17')?c.fg:c.fg);

  const shellRows=document.getElementById('shell-rows');
  shellRows.innerHTML=shells.map((count,i)=>{
    const cap=shellMax[i];
    const dots=Array.from({length:cap},(_,d)=>`<div class="e-dot ${d<count?'filled':'empty'}" style="background:${d<count?c.fg:'transparent'};border:0.5px solid ${c.fg};"></div>`).join('');
    return `<div class="shell-row">
      <span class="shell-label" style="color:var(--color-text-secondary);">${shellNames[i]} (n=${i+1})</span>
      <div class="shell-dots">${dots}</div>
      <span class="shell-count" style="color:${c.fg}">${count}</span>
    </div>`;
  }).join('');

  document.getElementById('ea-str').innerHTML=`<span style="color:var(--color-text-secondary);">Arrangement: </span><strong>${shells.join(', ')}</strong>`;

  document.getElementById('panel').className='panel show';
  document.getElementById('panel').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function closePanel(){document.getElementById('panel').className='panel';}

function filterEls(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const cat=document.getElementById('cat-filter').value;
  const state=document.getElementById('state-filter').value;
  document.querySelectorAll('.cell').forEach(c=>{
    const z=parseInt(c.dataset.z);if(!z)return;
    const el=ELS.find(e=>e.z===z);if(!el)return;
    const match=(!q||(el.name.toLowerCase().includes(q)||el.sym.toLowerCase().includes(q)||String(el.z).includes(q)))&&(!cat||el.cat===cat)&&(!state||el.state===state);
    c.classList.toggle('dimmed',!match);
  });
}

buildLegend();
buildGrid();
</script>
