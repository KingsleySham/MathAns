<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S.3 Maths Answer Finder</title>
    <meta name="description" content="S.3 Maths Answer Finder – 一個為香港中三學生提供數學答案查詢的工具。按章節及題號即可查看參考答案。A maths answer reference t[...]" />
  <meta name="keywords" content="S3 maths, S.3 maths answers, Hong Kong secondary school maths, 中三數學答案, 中學數學, mathans.app, mathans" />
  <meta name="author" content="KingsleySham" />
  <meta name="theme-color" content="#4A90E2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MathAns" />
  <link rel="canonical" href="https://www.mathans.app/" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512x512.png" />
  <link rel="apple-touch-icon" href="icon-192x192.png" />
  <meta property="og:title" content="S.3 Maths Answer Finder" />
  <meta property="og:description" content="按章節及題號查看中三數學參考答案。Look up S.3 maths answers by section and question number." />
  <meta property="og:url" content="https://www.mathans.app/" />
  <meta property="og:type" content="website" />
  <meta name="robots" content="index, follow" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page-wrap">
    <div class="card">

      <!-- Title -->
      <div class="card-title">
        <h1>S.3 Maths Answer Finder</h1>
      </div>

      <!-- Section selector row -->
      <div class="form-group">
        <div class="step-label">1. 選擇章節 (Section)</div>
        <!-- Normal section tabs -->
        <div class="section-tabs" id="section-tabs">
          <button class="tab active" data-section="4.1">4.1</button>
          <button class="tab" data-section="4.2">4.2</button>
          <button class="tab" data-section="4.3">4.3</button>
          <button class="tab" data-section="5.1">5.1</button>
          <button class="tab" data-section="5.2">5.2</button>
          <button class="tab" data-section="6.1">6.1</button>
          <button class="tab" data-section="6.3">6.3</button>
          <button class="tab tab-ut" data-section="UT">UT</button>
        </div>
      </div>

      <!-- UT Chapter picker (hidden unless UT selected) -->
      <div class="form-group" id="ut-chapter-group" style="display:none;">
        <div class="step-label">2. 選擇章節 (Chapter)</div>
        <div class="select-wrap">
          <select id="ut-chapter-select">
            <option value="">— 請選擇 / Select —</option>
            <option value="Ch4">Chapter 4</option>
            <option value="Ch5">Chapter 5</option>
            <option value="Ch6">Chapter 6</option>
            <option value="Ch7">Chapter 7</option>
          </select>
        </div>
      </div>

      <!-- Question number selector -->
      <div class="form-group" id="question-group">
        <div class="step-label" id="q-step-label">2. 選擇題號 (Question)</div>
        <div class="select-wrap">
          <select id="question-select">
            <option value="">— 請選擇 / Select —</option>
          </select>
        </div>
      </div>

      <!-- Submit button -->
      <button class="btn-check" id="btn-check" onclick="showResult()">
        查看答案 (View Answer)
      </button>

      <!-- Answer panel -->
      <div class="answer-panel" id="answer-panel" style="display:none;">

        <!-- Question label -->
        <div class="answer-header" id="answer-header"></div>

        <!-- Steps -->
        <div id="steps-container"></div>

        <!-- Final answer (yellow highlight) -->
        <div class="final-answer" id="final-answer"></div>
 </div>

    </div><!-- /card -->

    <footer>
      <p>For MathSmart 3A Consolidation Ex. &amp; School 2526 S.3 UT Practice Paper. 只支援「數學新領域3A精進練習」及校內統一測驗中三溫習卷。</p>
      <a>For reference only. 只供參考。</a>
    </footer>

  </div><!-- /page-wrap -->

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(err => {
        console.log('Service Worker registration failed:', err);
      });
    }
  </script>
</body>
</html>
