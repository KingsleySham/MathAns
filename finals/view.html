<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <title>Loading…</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; color: #eee; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #root { width: 100%; height: 100vh; }
    #root iframe { display: block; width: 100%; height: 100%; border: 0; background: #fff; }
    #err { display: none; padding: 32px; text-align: center; font-size: 16px; line-height: 1.5; }
    #err.show { display: block; }
    #err a { color: #6ea8fe; }
    .floating { position: fixed; z-index: 10; bottom: 16px; right: 16px; display: flex; gap: 8px; }
    .floating button, .floating a {
      appearance: none; border: 0; cursor: pointer;
      background: rgba(0, 0, 0, 0.65); color: #fff;
      padding: 8px 14px; border-radius: 999px;
      font: 600 13px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-decoration: none; backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: background 120ms ease;
    }
    .floating button:hover, .floating a:hover { background: rgba(0, 0, 0, 0.85); }
    .floating .icon { vertical-align: -2px; margin-right: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="err"></div>
  <div class="floating">
    <button id="fs-btn" type="button" aria-label="Enter fullscreen">
      <svg class="icon" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
        <path d="M4 4h6v2H6v4H4V4zm10 0h6v6h-2V6h-4V4zM4 14h2v4h4v2H4v-6zm14 0h2v6h-6v-2h4v-4z" fill="currentColor"/>
      </svg>Fullscreen
    </button>
    <a id="back-link" href="/finals/" aria-label="Back to finals hub">Back</a>
  </div>
  <script type="module" src="/finals/view.js"></script>
</body>
</html>
