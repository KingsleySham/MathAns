<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Speaking — Group Possibility · Finals</title>
  <meta name="description" content="S3 English Speaking exam (Paper 4) — pick your class and number to see who you might share your group with, and the chance for each." />
  <meta name="theme-color" content="#1a56db" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Speaking" />
  <meta property="og:title" content="English Speaking — Group Possibility" />
  <meta property="og:description" content="See who you might be grouped with in the S3 speaking exam." />
  <meta property="og:type" content="website" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <h1 class="site-title">English Speaking</h1>
      <div class="site-tagline">中三英文說話考試 · 分組機率</div>
    </div>
  </header>

  <main class="page-wrap">

    <div class="engp4-page-head">
      <a class="engp4-back" href="/finals/">&larr; Back to Finals Study Hub</a>
      <div class="engp4-meta" id="engp4-meta">Loading exam info…</div>
    </div>

    <div class="card" id="engp4-root"></div>

  </main>

  <footer class="site-footer">
    <div>Good luck with your speaking exam! 加油！</div>
    <div class="footer-links">
      <a href="/finals/">Finals Study Hub</a>
      <span>·</span>
      <a href="https://www.mathans.app/">mathans.app</a>
    </div>
  </footer>

  <script type="module">
    import { mountSpeaking, EXAM_INFO } from '../speaking.js';
    const meta = document.getElementById('engp4-meta');
    if (meta) {
      meta.textContent =
        `${EXAM_INFO.title} · ${EXAM_INFO.date} · Waiting room ${EXAM_INFO.waitingRoom} · Prep room ${EXAM_INFO.prepRoom}`;
    }
    mountSpeaking(document.getElementById('engp4-root'));
  </script>
</body>
</html>
